<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>オンライン対戦（完全版）</title>
<style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #202020;
      color: #f5f5f5;
    }
    /* =========================
      ★ 画面横幅制御（超重要）
    ========================= */
    #game-wrapper {
      position: relative;
      max-width: 1100px;   /* ← 半画面でちょうどいい正体 */
      width: 100%;
      margin: 0 auto;      /* 中央寄せ */
    }

    /* フルスクリーン時の余白背景 */
    body {
      background: #202020;
    }

    button { padding: 5px 12px; cursor:pointer; }
    button:disabled { background:#666; cursor:default; }

    .log-container { display: flex; gap: 12px; margin-top: 10px;}
    .log-box { 
      flex: 1;
      background:#111;
      border-radius:6px;
      padding:6px;

      height:160px;          /* ★ 縦幅を縮小 */
      overflow-y: auto;

      font-size: 11px;       /* ★ 少し小さく */
      line-height: 1.35;     /* ★ 読みやすさ維持 */
      font-family: Consolas;
    }
    
    /* --- 演出用アニメーション --- */
    .shake {
        animation: shake-anim 0.3s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake-anim {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    .hit-flash {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(255, 255, 255, 0.3); pointer-events: none;
        z-index: 9999; opacity: 0; animation: flash-anim 0.2s ease-out;
    }
    @keyframes flash-anim {
        0% { opacity: 1; }
        100% { opacity: 0; }
    }

    /* =========================
      ★ 開発者専用ログ制御
    ========================= */
    .log-container,
    h3 + .log-container {
      display: none;
    }

    /* DEBUG_MODE 用 */
    body.debug .log-container {
      display: flex;
    }

    .battle-log{ color:#ffd54f;}
    .skill-log{ color:#81d4fa;}
    .system-log{ color:#a5d6a7;}
    .error-log{ color:#ef9a9a;}
    .debug-log{ color:#b0bec5;}

    #skillPopup{
      display:none; position:fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(0,0,0,0.7);
      justify-content:center; align-items:center;
      z-index:10000; /* ★ 追加：最前面へ */
    }
    #skillBox{
      position: relative; /* ★ 追加：z-index有効化 */
      z-index:10001;      /* ★ 追加：背景より前 */
      background:#2b2b2b; padding:20px; border-radius:10px;
      width:380px;
    }

    .skillRow{ margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #555;}
    .skillName{ color:#81d4fa; font-size:16px; }
    .skillDesc{ white-space:pre-line; font-size:13px; color:#ddd; }

    /* ★ スキル使用済み（回数0）のボタン */
    .skillRow button.used-up{
      background:#333 !important;
      color:#bbb !important;
      border:1px solid #555 !important;
      opacity:0.75;
      cursor:not-allowed;
    }

    /* ============================
       ★ 共通ポップアップ（ショップ用）
    ============================ */
    .popup{
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:9999;
    }
    .popup-inner{
      background:#2b2b2b;
      padding:20px;
      border-radius:10px;
      width:380px;
      max-height:80vh;
      display:flex;
      flex-direction:column;
    }
    #shopList{
      overflow-y:auto;
      flex:1;
      margin-bottom:12px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .confirm-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:14px;
    }

    .shop-card{
      position:relative;
      overflow:hidden;
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      align-items:start;
      padding:14px 14px 14px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(135deg, rgba(28,31,38,0.96), rgba(18,20,26,0.96));
      box-shadow:
        0 10px 24px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .shop-card::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:0.72;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,0.15), transparent 18%),
        radial-gradient(circle at 82% 22%, rgba(255,255,255,0.08), transparent 14%),
        linear-gradient(135deg, rgba(255,255,255,0.03), transparent 48%);
    }

    .shop-card::after{
      content:"";
      position:absolute;
      inset:-20% -10%;
      pointer-events:none;
      opacity:0.24;
      background: linear-gradient(110deg, transparent 18%, rgba(255,255,255,0.18) 50%, transparent 82%);
      transform: translateX(-65%);
      animation: shopShine 5.8s ease-in-out infinite;
    }

    .shop-card.theme-bronze{
      border-color: rgba(210,124,62,0.62);
      background:
        radial-gradient(circle at 16% 18%, rgba(255,173,104,0.22), transparent 18%),
        radial-gradient(circle at 82% 18%, rgba(168,83,36,0.30), transparent 26%),
        radial-gradient(circle at 50% 120%, rgba(108,49,18,0.28), transparent 28%),
        linear-gradient(135deg, rgba(96,48,22,0.98), rgba(46,23,12,0.99));
      box-shadow:
        0 14px 28px rgba(0,0,0,0.32),
        0 0 22px rgba(194,104,41,0.18),
        inset 0 1px 0 rgba(255,218,176,0.12);
    }

    .shop-card.theme-silver{
      border-color: rgba(197,206,221,0.46);
      background:
        radial-gradient(circle at 14% 16%, rgba(246,248,255,0.22), transparent 16%),
        radial-gradient(circle at 86% 20%, rgba(186,198,218,0.28), transparent 26%),
        radial-gradient(circle at 50% 120%, rgba(131,146,171,0.22), transparent 32%),
        linear-gradient(135deg, rgba(68,75,89,0.98), rgba(31,37,49,0.98));
      box-shadow:
        0 14px 28px rgba(0,0,0,0.32),
        0 0 22px rgba(201,214,236,0.18),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .shop-card.theme-gold{
      border-color: rgba(255,219,94,0.74);
      background:
        radial-gradient(circle at 15% 18%, rgba(255,250,196,0.28), transparent 16%),
        radial-gradient(circle at 80% 16%, rgba(255,215,84,0.42), transparent 24%),
        radial-gradient(circle at 50% 120%, rgba(255,176,44,0.26), transparent 28%),
        linear-gradient(135deg, rgba(110,76,18,0.98), rgba(54,33,10,0.99));
      box-shadow:
        0 14px 28px rgba(0,0,0,0.32),
        0 0 28px rgba(255,208,74,0.24),
        inset 0 1px 0 rgba(255,248,214,0.16);
    }

    .shop-card.theme-rainbow{
      border-color: rgba(255,167,201,0.54);
      background:
        radial-gradient(circle at 10% 18%, rgba(255,126,95,0.26), transparent 18%),
        radial-gradient(circle at 85% 14%, rgba(255,230,109,0.28), transparent 22%),
        radial-gradient(circle at 20% 82%, rgba(87,227,137,0.24), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(99,102,241,0.28), transparent 24%),
        radial-gradient(circle at 54% 10%, rgba(236,72,153,0.20), transparent 20%),
        linear-gradient(135deg, rgba(68,26,54,0.96), rgba(18,28,58,0.98));
      box-shadow:
        0 16px 32px rgba(0,0,0,0.34),
        0 0 30px rgba(201,117,255,0.20),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .shop-card.theme-rainbow-blue{
      border-color: rgba(125,180,255,0.58);
      background:
        radial-gradient(circle at 12% 16%, rgba(110,231,255,0.28), transparent 18%),
        radial-gradient(circle at 86% 18%, rgba(129,140,248,0.32), transparent 24%),
        radial-gradient(circle at 24% 82%, rgba(96,165,250,0.26), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(59,130,246,0.30), transparent 24%),
        radial-gradient(circle at 56% 12%, rgba(192,132,252,0.18), transparent 20%),
        linear-gradient(135deg, rgba(20,40,82,0.97), rgba(17,22,58,0.98));
      box-shadow:
        0 16px 32px rgba(0,0,0,0.34),
        0 0 30px rgba(96,165,250,0.22),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .shop-card.theme-bronze::before,
    .shop-card.theme-silver::before,
    .shop-card.theme-gold::before,
    .shop-card.theme-rainbow::before,
    .shop-card.theme-rainbow-blue::before{
      background:
        radial-gradient(circle at 12% 18%, rgba(255,248,221,0.26), transparent 10%),
        radial-gradient(circle at 24% 68%, rgba(255,255,255,0.12), transparent 8%),
        radial-gradient(circle at 75% 22%, rgba(255,239,180,0.22), transparent 10%),
        radial-gradient(circle at 86% 60%, rgba(255,255,255,0.10), transparent 9%),
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 45%);
    }

    .shop-card-main{
      position:relative;
      z-index:1;
      min-width:0;
    }

    .shop-card-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }

    .shop-icon{
      width:52px;
      height:52px;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-size:28px;
      background: rgba(255,255,255,0.09);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      flex:0 0 auto;
    }

    .shop-icon img{
      width:42px;
      height:42px;
      object-fit:contain;
      display:block;
    }

    .shop-title-wrap{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .shop-item-name{
      font-size:16px;
      font-weight:800;
      color:#fff7e8;
      line-height:1.2;
      word-break:break-word;
    }

    .shop-meta-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .shop-meta-row.nowrap{
      flex-wrap:nowrap;
      gap:4px;
    }

    .shop-meta-row.nowrap .shop-badge{
      padding:3px 7px;
      font-size:10px;
    }

    .shop-badge{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:3px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      letter-spacing:0.03em;
      color:#f7f7f7;
      background: rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.10);
    }

    .shop-badge.kind-normal{ background:rgba(130,145,165,0.16); }
    .shop-badge.kind-special{ background:rgba(255,183,77,0.18); }
    .shop-badge.kind-job{ background:rgba(77,208,225,0.18); }
    .shop-badge.kind-rank{ background:rgba(255,124,124,0.18); }

    .shop-item-desc{
      font-size:12px;
      line-height:1.6;
      color:#dfe6ef;
      white-space:pre-line;
      opacity:0.94;
      margin-top:2px;
      overflow:visible;
    }

    .shop-buy-area{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      justify-content:flex-start;
      align-self:start;
      gap:10px;
      min-width:92px;
      padding-top:0;
      transform: translateY(-6px);
    }

    .shop-price{
      font-size:13px;
      font-weight:800;
      color:#ffe39c;
      padding:5px 10px;
      border-radius:999px;
      background: rgba(0,0,0,0.20);
      border:1px solid rgba(255,227,156,0.20);
    }

    .shop-buy-area button{
      min-width:78px;
      padding:8px 12px;
      border-radius:10px;
    }

    .inventory-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .inventory-card .shop-buy-area{
      min-width:88px;
    }

    .inventory-card .shop-buy-area button{
      min-width:88px;
    }

    @keyframes shopShine {
      0%, 100% { transform: translateX(-65%); opacity:0; }
      18% { opacity:0.14; }
      45% { transform: translateX(65%); opacity:0.24; }
      60% { opacity:0; }
    }



   
    /* ===== 簡易ステータス全体 ===== */
    .status-area {
      margin-top: 15px;
      margin-bottom: 15px;
      display: flex;
      gap: 12px;
    }

    /* ===== 自分 / 相手 共通 ===== */
    .status-simple {
      width: 240px;
      padding: 10px;
      background: #222;
      border: 1px solid #555;
      color: #fff;
      font-size: 13px;
    }

    /* ===== 相手側は少し色を変える ===== */
    #enemy-status-simple {
      background: #1a1a1a;
      border-color: #666;
    }
    

#phase0 {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  margin-top: -20px;
  margin-left: calc(50% - 50vw);
  margin-right: calc(50% - 50vw);
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(6, 8, 12, 0.58) 0%, rgba(8, 10, 16, 0.12) 39%, rgba(8, 10, 16, 0.18) 62%, rgba(6, 8, 12, 0.62) 100%),
    linear-gradient(180deg, rgba(0, 0, 0, 0.10) 0%, rgba(0, 0, 0, 0.30) 100%),
    url("Assets/ChatGPT Image 2026年4月23日 22_21_11.png") center center / cover no-repeat;
  color: #ecd9b1;
}

#phase0::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(167, 122, 61, 0.75);
  box-shadow: inset 0 0 0 1px rgba(255, 221, 163, 0.08);
  pointer-events: none;
  z-index: 0;
}

#phase0::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 52% 52%, rgba(248, 189, 97, 0.16), transparent 22%),
    linear-gradient(180deg, rgba(255,255,255,0.04), transparent 10%, transparent 90%, rgba(255,255,255,0.03));
  pointer-events: none;
  z-index: 0;
}

#phase0 > * {
  position: relative;
  z-index: 1;
}

#phase0Brand,
#phase0 .subtitle {
  display: none;
}

#phase0HomeLayout {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 240px minmax(300px, 1fr) 320px;
  gap: 20px;
  align-items: center;
  padding: 28px 72px 24px;
}

#phase0Settings {
  position: absolute;
  left: 18px;
  top: 18px;
  width: 44px;
  height: 44px;
  padding: 0 !important;
  display: grid;
  place-items: center;
  border-radius: 10px !important;
  font-size: 20px;
  border: 1px solid rgba(184, 142, 77, 0.7) !important;
  background: linear-gradient(180deg, rgba(33, 38, 46, 0.92), rgba(20, 22, 28, 0.96)) !important;
  color: #d9bd84 !important;
  box-shadow: 0 6px 18px rgba(0,0,0,0.28), inset 0 0 0 1px rgba(255,230,180,0.06);
}

#titleModePanel {
  position: relative;
  left: auto;
  top: auto;
  transform: none;
  width: 100%;
  max-width: 232px;
  padding: 44px 0 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: stretch;
  justify-self: center;
}

#titleModePanel button {
  width: 100%;
}

.phase0-menu-btn {
  min-height: 62px;
  padding: 0 18px !important;
  display: grid;
  grid-template-columns: 42px 1fr;
  gap: 14px;
  align-items: center;
  text-align: left;
  border-radius: 12px !important;
  border: 1px solid rgba(170, 127, 68, 0.8) !important;
  background:
    linear-gradient(180deg, rgba(37, 41, 49, 0.94), rgba(21, 24, 31, 0.98)) !important;
  color: #ecd7ad !important;
  box-shadow:
    0 10px 24px rgba(0,0,0,0.25),
    inset 0 0 0 1px rgba(250, 223, 169, 0.06),
    inset 0 0 18px rgba(185, 137, 72, 0.08) !important;
}

.phase0-menu-btn:hover:not(:disabled) {
  border-color: rgba(226, 182, 109, 0.95) !important;
  box-shadow:
    0 10px 24px rgba(0,0,0,0.32),
    inset 0 0 0 1px rgba(250, 223, 169, 0.10),
    0 0 16px rgba(213, 154, 79, 0.12) !important;
}

.phase0-menu-btn:disabled {
  opacity: 0.9 !important;
}

.phase0-menu-icon {
  width: 42px;
  text-align: center;
  font-size: 28px;
  color: #d6b274;
  filter: drop-shadow(0 0 8px rgba(235, 193, 122, 0.15));
}

.phase0-menu-text {
  font-size: 18px;
  letter-spacing: 0.04em;
}

.phase0-menu-note {
  display: block;
  margin-top: 2px;
  font-size: 12px;
  color: rgba(229, 214, 184, 0.72);
}

#phase0Hero {
  text-align: center;
  align-self: start;
  padding-top: 34px;
}

#phase0LogoMark {
  font-size: 50px;
  line-height: 1;
  color: rgba(235, 219, 187, 0.3);
  margin-bottom: 6px;
}

#phase0Title {
  margin: 0;
  font-size: clamp(72px, 8vw, 108px);
  line-height: 0.88;
  letter-spacing: 0.03em;
  font-family: Georgia, "Times New Roman", serif;
  color: #e8c98b;
  text-shadow:
    0 2px 0 rgba(255,255,255,0.1),
    0 0 18px rgba(235, 184, 90, 0.20),
    0 12px 24px rgba(0,0,0,0.45);
}

#phase0TitleSub {
  margin-top: 8px;
  font-size: 26px;
  letter-spacing: 0.34em;
  color: #efdfbf;
}

/* ================= 職業カード配置 ================= */

#jobSelectArea {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin: 12px 0;
}

/* ================= Title Ranking Panel ================= */
#titleRankingPanel {
  position: relative;
  right: auto;
  top: auto;
  transform: none;
  width: 100%;
  max-width: 360px;
  justify-self: center;
  background: linear-gradient(180deg, rgba(12, 16, 22, 0.92), rgba(10, 12, 16, 0.95));
  border: 1px solid rgba(163, 119, 61, 0.8);
  border-radius: 14px;
  padding: 18px 18px 14px;
  text-align: left;
  box-shadow:
    0 18px 30px rgba(0,0,0,0.28),
    inset 0 0 0 1px rgba(248, 223, 173, 0.05);
}
#titleRankingHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
#titleRankingHeader .name {
  font-size: 14px;
  color: rgba(236, 218, 185, 0.9);
  margin-top: 10px;
}
#titleRankingHeader .job {
  font-size: 16px;
  font-weight: 700;
  color: #f0d39b;
  letter-spacing: 0.06em;
}
#titleRankingJobs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 14px 0 14px 0;
}
#titleRankingJobs button {
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px !important;
  border: 1px solid rgba(160, 118, 63, 0.72) !important;
  background: linear-gradient(180deg, rgba(22, 25, 32, 0.92), rgba(13, 15, 20, 0.96)) !important;
  color: #e6cfaa !important;
}

#titleRankingJobs button.active {
  background: linear-gradient(180deg, rgba(148, 105, 49, 0.96), rgba(89, 61, 29, 0.98)) !important;
  color: #fff0d0 !important;
  border-color: rgba(227, 184, 110, 0.96) !important;
  box-shadow: 0 0 14px rgba(215, 159, 77, 0.16) !important;
}
#titleRankingList {
  font-size: 12px;
  line-height: 1.6;
  margin-top: 4px;
}
.title-rank-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  min-height: 44px;
  padding: 4px 2px;
  border-bottom: 1px solid rgba(179, 134, 69, 0.16);
}
.title-rank-row .left {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #f0ddbc;
}
.title-rank-row .right {
  white-space: nowrap;
  opacity: 0.96;
  color: #eccf97;
}

#btnChangeName {
  font-size: 12px !important;
  padding: 8px 12px !important;
  border-radius: 8px !important;
  border: 1px solid rgba(160, 118, 63, 0.72) !important;
  background: linear-gradient(180deg, rgba(27, 30, 36, 0.94), rgba(16, 18, 24, 0.96)) !important;
  color: #e8d4b0 !important;
}

.title-my-stats {
  margin-top: 10px;
  padding-bottom: 12px;
  font-size: 14px;
  color: rgba(238, 224, 196, 0.9);
  border-bottom: 1px solid rgba(174, 131, 69, 0.16);
}

@media (max-width: 1100px) {
  #phase0HomeLayout {
    grid-template-columns: 220px minmax(240px, 1fr) 300px;
    gap: 18px;
    padding-left: 40px;
    padding-right: 40px;
  }
}

@media (max-width: 900px) {
  #phase0HomeLayout {
    grid-template-columns: 1fr;
    gap: 20px;
    padding-top: 72px;
  }

  #titleModePanel,
  #titleRankingPanel {
    max-width: none;
    justify-self: stretch;
  }

  #titleModePanel {
    order: 2;
  }

  #phase0Hero {
    order: 1;

@keyframes attackMove{
  0%   { transform: translateX(0); }
  50%  { transform: translateX(var(--attackX)); }
  100% { transform: translateX(0); }
}

@keyframes hitShake{
  0%   { transform: translateX(0); filter:brightness(1); }
  30%  { transform: translateX(-4px); filter:brightness(1.25); }
  60%  { transform: translateX(4px);  filter:brightness(1.25); }
  100% { transform: translateX(0); filter:brightness(1); }
}

@keyframes healGlow{
  0%   { filter:brightness(1); }
  40%  { filter:brightness(1.35); }
  100% { filter:brightness(1); }
}

.sprite.attack{ animation: attackMove 0.26s ease-in-out; }
.sprite.hit   { animation: hitShake 0.26s ease-in-out; }
.sprite.heal  { animation: healGlow 0.45s ease-in-out; }

@keyframes floatUp{
  0%   { opacity:1; transform: translate(-50%, -50%) translateY(0); }
  100% { opacity:0; transform: translate(-50%, -50%) translateY(-34px); }
}

}

.heal-popup  { color:#b7ffb7; }
.summon-popup{

  top:34%;

  pointer-events:none;
  text-shadow: 0 0 10px rgba(116,232,255,0.42), 0 0 18px rgba(255,220,138,0.20);

  white-space:nowrap;
  color:#9fe8ff;

.shikigami-special-popup{

  left:50%;
  top:34%;
  font-weight:900;
  font-size:17px;
  pointer-events:none;
  text-shadow: 0 0 10px rgba(255,179,71,0.5), 0 0 18px rgba(255,120,64,0.28);
  animation: floatUp 1s ease-out forwards;
  white-space:nowrap;
  color:#ffd27a;
}

.buff-strip.kyubi-purge{
  animation: kyubiBuffPurge 0.8s ease-out;
}

.equip-area.kyubi-burn .equip-slot,
.special-equip-area.kyubi-burn{
  animation: kyubiEquipBurn 1s ease-out;
  box-shadow: 0 0 0 1px rgba(255,140,82,0.4), 0 0 18px rgba(255,120,64,0.45);
}

.equip-area.kyubi-burn .equip-slot::after,
.special-equip-area.kyubi-burn::after{
  content:"";
  position:absolute;
  inset:-6px;
  pointer-events:none;
  border-radius:14px;
  background:
    radial-gradient(circle at 50% 100%, rgba(255,219,120,0.35), transparent 45%),
    radial-gradient(circle at 30% 80%, rgba(255,118,64,0.45), transparent 40%),
    radial-gradient(circle at 70% 75%, rgba(255,86,34,0.38), transparent 42%);
  animation: kyubiFlare 0.95s ease-out forwards;
}

/* 種類別（dot / pursuit） */
.damage-popup.kind-dot{ color:#c7b3ff; }
.damage-popup.kind-pursuit{ color:#ffd28a; }
.damage-popup.kind-guts{ color:#ff8a80; text-shadow: 0 0 12px rgba(255,138,128,0.55), 0 0 20px rgba(255,138,128,0.28); }

@keyframes kyubiBuffPurge {
  0% { transform: scale(1); filter: brightness(1); opacity: 1; }
  35% { transform: scale(1.08); filter: brightness(1.9); opacity: 1; }
  100% { transform: scale(1); filter: brightness(1); opacity: 1; }
}

@keyframes kyubiEquipBurn {
  0% { transform: translateY(0) scale(1); filter: saturate(1); }
  30% { transform: translateY(-2px) scale(1.03); filter: saturate(1.7) brightness(1.35); }
  100% { transform: translateY(0) scale(1); filter: saturate(1); }
}

@keyframes kyubiFlare {
  0% { opacity: 0; transform: scale(0.7); }
  25% { opacity: 0.95; transform: scale(1.02); }
  100% { opacity: 0; transform: scale(1.18); }
}

/* ================================
   Cyber Theme Overrides
   - 既存UIを壊さず上書き
================================= */
:root{
  --cy-bg0:#0b0f1a;
  --cy-bg1:#050816;
  --cy-panel:rgba(17,24,39,0.78);
  --cy-panel2:rgba(15,23,42,0.72);
  --cy-line:rgba(34,211,238,0.40);
  --cy-line2:rgba(167,139,250,0.34);
  --cy-cyan:#22d3ee;
  --cy-purple:#a78bfa;
  --cy-text:#e5e7eb;
  --cy-muted:#9ca3af;
  --cy-danger:#ff4d6d;
  --cy-ok:#22d3ee;
}

body{
  color:var(--cy-text) !important;
  background:
    radial-gradient(1200px 520px at 18% -10%, rgba(34,211,238,0.16), transparent 62%),
    radial-gradient(900px 520px at 84% 0%, rgba(167,139,250,0.14), transparent 58%),
    repeating-linear-gradient(180deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px),
    linear-gradient(180deg, var(--cy-bg1), var(--cy-bg0));
  background-attachment: fixed;
}

/* パネル/箱 */
#titlePanel, #titleRankingPanel, #cpuOptionArea{
  background: var(--cy-panel) !important;
  border: 1px solid rgba(34,211,238,0.22) !important;
  box-shadow: 0 0 14px rgba(34,211,238,0.08), 0 0 28px rgba(167,139,250,0.05) !important;
  backdrop-filter: blur(6px);
}

#phase1, #phase2{
  border: 1px solid rgba(34,211,238,0.22) !important;
  box-shadow: 0 0 14px rgba(34,211,238,0.08), 0 0 28px rgba(167,139,250,0.05) !important;
  backdrop-filter: blur(6px);
}

/* タイトル右：自分成績 */
.title-my-stats{
  margin-top:6px;
  font-size:12px;
  line-height:1.45;
  color: var(--cy-text);
  opacity:0.92;
}
.cyber-accent{ color: var(--cy-cyan); text-shadow: 0 0 8px rgba(34,211,238,0.35); font-weight: 800; }
.cyber-muted{ color: var(--cy-muted); }

/* ボタン（全体） */
button{
  background: rgba(15,23,42,0.92) !important;
  color: var(--cy-text) !important;
  border: 1px solid rgba(34,211,238,0.34) !important;
  border-radius: 10px !important;
  transition: box-shadow .15s ease, transform .08s ease, border-color .15s ease, background .15s ease;
}
button:hover:not(:disabled){
  border-color: rgba(34,211,238,0.65) !important;
  box-shadow: 0 0 12px rgba(34,211,238,0.22), inset 0 0 10px rgba(34,211,238,0.10) !important;
  transform: translateY(-1px);
}
button:active:not(:disabled){
  transform: translateY(0px);
  box-shadow: 0 0 10px rgba(34,211,238,0.18), inset 0 0 14px rgba(34,211,238,0.12) !important;
}
button:disabled{
  opacity: 0.45 !important;
  cursor: not-allowed !important;
  box-shadow: none !important;
}

/* 入力 */
input, select{
  background: rgba(2,6,23,0.75) !important;
  color: var(--cy-text) !important;
  border: 1px solid rgba(34,211,238,0.24) !important;
  border-radius: 10px !important;
  outline: none;
}
input:focus, select:focus{
  border-color: rgba(34,211,238,0.60) !important;
  box-shadow: 0 0 0 3px rgba(34,211,238,0.14) !important;
}

/* バトルステージ枠 */
#battleStage{
  background: var(--cy-panel2) !important;
  border: 1px solid rgba(34,211,238,0.20) !important;
  box-shadow: inset 0 0 22px rgba(34,211,238,0.06) !important;
}

/* 簡易ステータス枠 */
.status-simple{
  background: rgba(2,6,23,0.55) !important;
  border: 1px solid rgba(34,211,238,0.18) !important;
  box-shadow: 0 0 12px rgba(34,211,238,0.06) !important;
}

/* ログ箱 */
.log-box{
  background: rgba(2,6,23,0.55) !important;
  border: 1px solid rgba(34,211,238,0.15) !important;
}

/* HPバー発光 */
.hp-fill{
  box-shadow: 0 0 10px rgba(34,211,238,0.18);
}
.hp-fill.doll{
  box-shadow: 0 0 10px rgba(167,139,250,0.18);
}

/* ダメージ表示 */
.damage-popup{
  text-shadow: 0 0 10px rgba(255,77,109,0.30), 0 0 18px rgba(255,77,109,0.18);
}

/* 勝敗オーバーレイ（inline style を上書き） */
#resultOverlay{
  background: rgba(0,0,0,0.82) !important;
}
#resultPanel{
  background: rgba(2,6,23,0.88) !important;
  border: 1px solid rgba(34,211,238,0.28) !important;
  box-shadow: 0 0 18px rgba(34,211,238,0.12), 0 0 40px rgba(167,139,250,0.08) !important;
}
#resultTitle{
  color: var(--cy-cyan) !important;
  text-shadow: 0 0 14px rgba(34,211,238,0.35) !important;
  letter-spacing: 0.22em !important;
}

/* 人形スプライト：ツールチップ（hover/tap）を使うため pointer-events は無効化しない */
/* =========================

  }

}

<script>

// ====================
// ★ デバッグモード
// ====================
const DEBUG_MODE = false; // ← 開発中 true / 通常プレイ false

// ==================== フェーズ管理 ====================
const PHASE = {
  MODE_SELECT: 0,
  RANDOM_READY: 1,
  BATTLE: 2
};

let currentPhase = PHASE.MODE_SELECT;


function setPhase(p) {
  // 視覚演出のトリガー
  function triggerHitEffect() {
      // 1. フラッシュ
      const flash = document.createElement("div");
      flash.className = "hit-flash";
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 200);

      // 2. 画面揺れ
      const wrapper = document.getElementById("game-wrapper");
      if (wrapper) {
          wrapper.classList.add("shake");
          setTimeout(() => wrapper.classList.remove("shake"), 300);
      }
  }
  currentPhase = p;

  document.getElementById("phase0").style.display =
    p === PHASE.MODE_SELECT ? "block" : "none";

  document.getElementById("phase1").style.display =
    p === PHASE.RANDOM_READY ? "block" : "none";

  document.getElementById("phase2").style.display =
    p === PHASE.BATTLE ? "block" : "none";

  if (p === PHASE.RANDOM_READY) {
    // ★ 職業未選択時は接続ボタンを押せないようにする
    const btn = document.getElementById("btnConnectPhase1");
    if (btn) btn.disabled = !selectedJobId;

    // refresh job record from server, then re-render cards
    refreshSummary().then(() => renderJobCards());
  }

  if (p === PHASE.MODE_SELECT) {
    // refresh title UI (ranking + name)
    setAccountNameUI();
    fetchAndRenderRanking(currentRankingJob);
  }

  // ★ デバッグモード反映（ここから）
  if (DEBUG_MODE) {
    document.body.classList.add("debug");
  } else {
    document.body.classList.remove("debug");
  }
  // ★ デバッグモード反映（ここまで）

}


/* ====================
   グローバル変数
==================== */

let currentItemCategory = null;
let isItemUIOpen = false; // ★ 追加

const LS_JOB_RECORD_KEY = (aid) => `gs_job_record_${aid}`;

function loadLocalJobRecord(aid) {
  try {
    const raw = localStorage.getItem(LS_JOB_RECORD_KEY(aid));
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || typeof obj !== "object") return null;
    return obj;
  } catch (e) {
    console.warn("loadLocalJobRecord failed:", e);
    return null;
  }
}

function saveLocalJobRecord(aid, jobs) {
  try {
    localStorage.setItem(LS_JOB_RECORD_KEY(aid), JSON.stringify(jobs || {}));
  } catch (e) {
    console.warn("saveLocalJobRecord failed:", e);
  }
}

function mergeJobRecords(serverJobs, localJobs) {
  const out = { ...(serverJobs || {}) };
  const l = localJobs || {};
  for (const [job, rec] of Object.entries(l)) {
    const s = out[job];
    const su = Number(s?.updatedAt ?? 0) || 0;
    const lu = Number(rec?.updatedAt ?? 0) || 0;
    const hasLocalProgress =
      (Number(rec?.wins ?? 0) || 0) + (Number(rec?.losses ?? 0) || 0) > 0 ||
      (Number(rec?.rating ?? 1000) || 1000) !== 1000;
    const hasServerProgress =
      (Number(s?.wins ?? 0) || 0) + (Number(s?.losses ?? 0) || 0) > 0 ||
      (Number(s?.rating ?? 1000) || 1000) !== 1000;

    // 優先順位：
    // 1) updatedAt が新しい方
    // 2) サーバが“初期化状態”っぽいならローカル優先
    if (!s) {
      out[job] = rec;
    } else if (lu > su) {
      out[job] = rec;
    } else if (!hasServerProgress && hasLocalProgress) {
      out[job] = rec;
    }
  }
  return out;
}

function validateNameClient(name) {
  if (typeof name !== "string") return { ok: false, reason: "名前が不正です" };
  if (/[\n\r\t]/.test(name)) return { ok: false, reason: "改行・タブは禁止です" };
  if (name !== name.trim()) return { ok: false, reason: "先頭・末尾スペースは禁止です" };
  if (/ {2,}/.test(name)) return { ok: false, reason: "連続スペースは禁止です" };
  const len = [...name].length;
  if (len < 2 || len > 12) return { ok: false, reason: "名前は2〜12文字です" };
  return { ok: true };
}

function uuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  // fallback
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === "x" ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

async function apiPost(path, body) {
  const r = await fetch(API_BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function apiGet(path) {
  const r = await fetch(API_BASE + path);
  return r.json();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => {
    switch (c) {
      case "&": return "&amp;";
      case "<": return "&lt;";
      case ">": return "&gt;";
      case '"': return "&quot;";
      case "'": return "&#39;";
      default: return c;
    }
  });
}

let currentRankingJob = "戦士";

function renderRankingButtons() {
  const box = document.getElementById("titleRankingJobs");
  if (!box) return;
  box.innerHTML = "";
  JOB_LIST.forEach(j => {
    const b = document.createElement("button");
    b.textContent = j.name;
    if (j.name === currentRankingJob) b.classList.add("active");
    b.onclick = () => { fetchAndRenderRanking(j.name); };
    box.appendChild(b);
  });
}

function renderRankingList(data) {
  const box = document.getElementById("titleRankingList");
  const lbl = document.getElementById("titleRankingJobLabel");
  if (lbl) lbl.textContent = `${currentRankingJob} ランキング`;

  if (!box) return;
  if (!data?.ok) {
    box.textContent = "取得に失敗しました";
    return;
  }

  const rows = (data.top || []).map(r => {
    return `
      <div class="title-rank-row">
        <div class="left">${r.rank}. ${escapeHtml(r.name)}</div>
        <div class="right">レート ${r.rating}</div>
      </div>
    `;
  }).join("");

  box.innerHTML = rows || "データがありません";
}


function renderTitleMyStats(jobName) {
  const el = document.getElementById("titleMyStats");
  if (!el) return;

  const rec = window.jobRecord?.[jobName] ?? null;
  const wins = Number(rec?.wins ?? 0) || 0;
  const losses = Number(rec?.losses ?? 0) || 0;
  const rating = Number(rec?.rating ?? 1000) || 1000;
  const rank = getRankByWins(wins);
  const nextNeed = getNextRankNeed(wins);

  const needText =
    nextNeed === null ? "MAX" : `次Rまで ${Math.max(0, nextNeed - wins)} 勝`;

  el.innerHTML = `
    あなたの戦績: <span class="cyber-accent">R${rank}</span>
    / ${wins}勝 ${losses}敗 / レート ${rating}
    <span class="cyber-muted">${needText}</span>
  `;
}
async function fetchAndRenderRanking(jobName) {
  currentRankingJob = jobName;
  renderTitleMyStats(jobName);
  renderRankingButtons();
  try {
    const data = await apiGet(`/api/ranking?job=${encodeURIComponent(jobName)}`);
    renderRankingList(data);
  } catch (e) {
    console.warn("ranking failed:", e);
    renderRankingList({ ok: false });
  }
}
async function changeNameFlow() {
  const input = prompt("新しい名前を入力してください（2〜12文字）", window.accountName || "");
  if (input === null) return;
  const name = String(input);
  const v = validateNameClient(name);
  if (!v.ok) {
    alert(v.reason);
    return;
  }

  try {
    const data = await apiPost("/api/account/change_name", {
      account_id: window.accountId,
      name
    });

    if (!data?.ok) {
      if (data?.nextNameChangeAt) {
        const d = new Date(data.nextNameChangeAt);
        alert(`${data.reason}
次回変更可能：${d.toLocaleString()}`);
      } else {
        alert(data?.reason || "変更に失敗しました");
      }
      return;
    }

    window.accountName = name;
    localStorage.setItem(LS_ACCOUNT_NAME, name);
    setAccountNameUI();
    await fetchAndRenderRanking(currentRankingJob);
  } catch (e) {
    console.warn("change name failed:", e);
    alert("変更に失敗しました");
  }
}

// ================================
// マッチング表示（秒数） & CPU自動切替
// ================================
let matchTimerId = null;
let matchSeconds = 0;
let autoCpuTriggered = false;
let roomTimeoutTriggered = false;
let cpuConnectFailTimerId = null;

window.matchMode = "random"; // "random" | "room" | "cpu"

function stopMatchTimer() {
  if (matchTimerId) {
    clearInterval(matchTimerId);
    matchTimerId = null;
  }
  matchSeconds = 0;
  autoCpuTriggered = false;
  roomTimeoutTriggered = false;
}

function clearCpuFailTimer() {
  if (cpuConnectFailTimerId) {
    clearTimeout(cpuConnectFailTimerId);
    cpuConnectFailTimerId = null;
  }
}

function updateMatchStatusText() {
  const status = document.getElementById("connectStatus");
  if (!status) return;
  if (!isConnecting) return;

  if (window.matchMode === "random") {
    status.textContent = `マッチング中... ${matchSeconds}秒`;
    return;
  }

  if (window.matchMode === "room") {
    status.textContent = `ルーム待機中... ${matchSeconds}秒`;
    return;
  }

  // CPU
  status.textContent = `CPUと接続中... ${matchSeconds}秒`;
}

function startMatchTimer() {
  stopMatchTimer();
  matchSeconds = 0;
  autoCpuTriggered = false;
  roomTimeoutTriggered = false;

  updateMatchStatusText();

  matchTimerId = setInterval(() => {
    matchSeconds += 1;

    // ランダム対戦のみ：30秒経過でCPUへ自動切替
    if (window.matchMode === "random" && !autoCpuTriggered && matchSeconds >= 30) {
      autoCpuTriggered = true;
      triggerAutoCpuMatch();
      // 以降も秒数は数え続ける（表示は match_start で消える）
    }

    // ルーム対戦のみ：60秒経過でタイムアウト（CPUへは行かない）
    if (window.matchMode === "room" && !roomTimeoutTriggered && matchSeconds >= 60) {
      roomTimeoutTriggered = true;
      handleRoomTimeout();
      return;
    }

    updateMatchStatusText();
  }, 1000);
}

function handleRoomTimeout() {
  // ルーム対戦：1分待っても相手がいない場合は接続を切って再接続可能にする
  cleanupSocket();
  stopMatchTimer();
  clearCpuFailTimer();

  isConnecting = false;
  const btn = document.getElementById("btnConnectPhase1");
  if (btn) btn.disabled = false;

  const status = document.getElementById("connectStatus");
  if (status) status.textContent = "相手が見つかりませんでした";
}

function cleanupSocket() {
  if (ws) {
    try { ws.close(); } catch (e) {}
    ws = null;
  }
}

function backToTitleWithError(message) {
  cleanupSocket();
  stopMatchTimer();
  clearCpuFailTimer();

  isConnecting = false;
  const btn = document.getElementById("btnConnectPhase1");
  if (btn) btn.disabled = false;

  const status = document.getElementById("connectStatus");
  if (status) status.textContent = message || "通信エラーです";

  setTimeout(() => {
    const st = document.getElementById("connectStatus");
    if (st) st.textContent = "";
    setPhase(PHASE.MODE_SELECT);
    refreshSummary();
    fetchAndRenderRanking(currentRankingJob);
  }, 1200);
}

function triggerAutoCpuMatch() {
  // 30秒経過 → CPU戦へ
  cleanupSocket();

  window.isCpuMode = true;
  window.matchMode = "cpu";
  // ★ ランダム対戦からの自動CPU（レート変動対象）
  window.cpuKind = "auto";

  const roomArea = document.getElementById("roomCodeArea");
  if (roomArea) roomArea.style.display = "none";

  const cpuArea = document.getElementById("cpuJobArea");
  if (cpuArea) cpuArea.style.display = "none";

  const title = document.getElementById("phase1Title");
  if (title) title.textContent = "CPU戦（自動）";

  const status = document.getElementById("connectStatus");
  if (status) status.textContent = "30秒経過：CPUとマッチングします...";

  // CPU接続が成立しない場合は通信エラーにする
  clearCpuFailTimer();
  cpuConnectFailTimerId = setTimeout(() => {
    if (isConnecting) {
      backToTitleWithError("通信エラーです");
    }
  }, 8000);

  joinCpu();
}


const RANK_THRESHOLDS = [
  10, 25, 50, 100, 200, 400, 600, 800, 1000
];

// ================= 勝利数 → ランク変換 =================
function getRankByWins(wins) {
  if (wins >= 1000) return 10;
  if (wins >= 800)  return 9;
  if (wins >= 600)  return 8;
  if (wins >= 400)  return 7;
  if (wins >= 200)  return 6;
  if (wins >= 100)  return 5;
  if (wins >= 50)   return 4;
  if (wins >= 25)   return 3;
  if (wins >= 10)   return 2;
  return 1; // 0〜9勝
}

function getNextRankNeed(wins) {
  for (let i = 0; i < RANK_THRESHOLDS.length; i++) {
    if (wins < RANK_THRESHOLDS[i]) {
      return RANK_THRESHOLDS[i];
    }
  }
  return null; // MAXランク
}

function renderJobBars(stats) {
  const MAX = 5;

  const map = [
    { key: "luck", label: "運要素" },
    { key: "burst", label: "爆発力" },
    { key: "difficulty", label: "難易度" },
    { key: "stability", label: "安定感" }
  ];

  return map.map(m => {
    const v = stats[m.key] ?? 0;
    const percent = (v / MAX) * 100;

    return `
      <div class="job-bar-row">
        <div class="job-bar-label">${m.label}</div>
        <div class="job-bar-bg">
          <div class="job-bar-fill" style="width:${percent}%"></div>
        </div>
      </div>
    `;
  }).join("");
}

function renderJobCards() {
  const area = document.getElementById("jobSelectArea");
  area.innerHTML = "";

  JOB_LIST.forEach(job => {

    const rec = window.jobRecord?.[job.name] ?? null;
    const wins = rec?.wins ?? 0;
    const rating = rec?.rating ?? 1000;
    const rank = getRankByWins(wins);
    const nextNeed = getNextRankNeed(wins);


    const card = document.createElement("div");
    card.className = "job-card";
    card.onclick = () => selectJob(job.id);

    card.innerHTML = `
      <div class="job-header">
        <span>${job.name}（R${rank}）</span>

        <span class="job-rank-progress">
          ${
            nextNeed === null
              ? `${wins} 勝（MAX）`
              : `${wins} / ${nextNeed} 勝`
          }
          <br>
          レート ${rating}
        </span>

        <button class="job-detail-btn"
          onclick="event.stopPropagation(); openJobDetail(${job.id})">
          詳細
        </button>
      </div>


      <div class="job-bars">
        ${renderJobBars(job.stats)}

      <div class="job-stats">
        <div>基礎攻撃力：${job.atk}</div>
        <div>基礎防御力：${job.def}</div>
        <div>初期コイン：${job.coin}</div>
      </div>
    `;


    area.appendChild(card);
  });
}

// ============================
const popupStacks = {
  self: 0,
  enemy: 0,
  self_doll: 0,
  enemy_doll: 0
};


function getSprites() {
  return {
    self: document.getElementById("playerSprite"),
    enemy: document.getElementById("enemySprite"),
    self_doll: document.getElementById("dollSprite"),
    enemy_doll: document.getElementById("dollSpriteEnemy"),
  };
}

function bumpStack(targetKey) {
  const idx = popupStacks[targetKey] ?? 0;
  popupStacks[targetKey] = idx + 1;

  // 上にずらす（同時発生で重ならない）
  const offsetPx = -idx * 18;

  setTimeout(() => {
    popupStacks[targetKey] = Math.max(0, (popupStacks[targetKey] ?? 1) - 1);
  }, 900);

  return offsetPx;
}

function spawnPopup(sprite, className, text, offsetPx) {
  if (!sprite) return;

  const el = document.createElement("div");
  el.className = className;
  el.textContent = text;
  el.style.top = `calc(40% + ${offsetPx}px)`;

  sprite.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function pulseClass(el, className, duration = 900) {
  if (!el) return;
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
  setTimeout(() => el.classList.remove(className), duration);
}

function getSideFromTarget(targetKey) {
  return String(targetKey ?? "").startsWith("enemy") ? "enemy" : "self";
}

function getEquipAreaBySide(side) {
  return side === "enemy"
    ? document.querySelector(".equip-area.enemy")
    : document.querySelector(".equip-area:not(.enemy)");
}

function getSpecialEquipAreaBySide(side) {
  return side === "enemy"
    ? document.querySelector('.special-equip-area.enemy[data-side="enemy"]:not(.doll)')
    : document.querySelector('.special-equip-area[data-side="self"]:not(.doll)');
}

function showShikigamiSummonEvent(data) {
  const sprites = getSprites();
  const targetSprite = sprites[data.target];
  const names = Array.isArray(data.names) ? data.names : [];

  if (targetSprite) {
    names.forEach((name, index) => {
      setTimeout(() => {
        const offsetPx = bumpStack(data.target) - (index * 10);
        spawnPopup(targetSprite, "summon-popup", `式神 ${name}`, offsetPx);
      }, index * 180);
    });
  }

  const actorName = data.actor_name ?? "陰陽師";
  const joinedNames = names.join("・");
  showCenterToast(`✨ ${actorName} が ${joinedNames} を召喚！`, names.length >= 2 ? 2600 : 2200);
}

function showShikigamiSpecialEvent(data) {
  if (data?.kind !== "kyubi") return;

  const sprites = getSprites();
  const targetSprite = sprites[data.target];
  const side = getSideFromTarget(data.target);
  const buffStrip = document.getElementById(side === "enemy" ? "buffStripEnemy" : "buffStripSelf");
  const equipArea = getEquipAreaBySide(side);
  const specialEquipArea = getSpecialEquipAreaBySide(side);
  const messages = [];

  if (data.destroyed_equip_name) {
    messages.push("装備破壊");
    pulseClass(equipArea, "kyubi-burn", 1050);
    pulseClass(specialEquipArea, "kyubi-burn", 1050);
  }
  if (Number(data.removed_buff_count ?? 0) > 0) {
    messages.push("バフ解除");
    pulseClass(buffStrip, "kyubi-purge", 820);
  }

  if (targetSprite) {
    messages.forEach((msg, index) => {
      setTimeout(() => {
        const offsetPx = bumpStack(data.target) - (index * 12);
        spawnPopup(targetSprite, "shikigami-special-popup", msg, offsetPx);
      }, index * 160);
    });
  }

  const actorName = data.actor_name ?? "陰陽師";
  const parts = [];
  if (data.destroyed_equip_name) {
    parts.push(`装備「${data.destroyed_equip_name}」を破壊`);
  }
  if (Number(data.removed_buff_count ?? 0) > 0) {
    parts.push(`バフ${Number(data.removed_buff_count)}個解除`);
  }
  if (parts.length > 0) {
    showCenterToast(`🦊 ${actorName} の九尾が ${parts.join(" / ")}！`, 2600);
  }
}

    leg:  "ズボン",
    foot: "靴"
  };

  const costumes = doll.costumes || {};
  const parts = ["head", "body", "leg", "foot"];

  const rows = parts.map(p => {
    const c = costumes[p];
    if (!c) {
      return `<div style="opacity:0.75;">${partLabel[p]}：なし</div>`;
    }

    const name = (typeof c === "string") ? c : (c.name || "不明な衣装");
    const effect = (typeof c === "object") ? (c.effect_text || c.effect || "") : "";

    return `
      <div style="margin-top:4px;">
        <b>${partLabel[p]}</b>：${name}
        ${effect ? `<div style="opacity:0.9; margin-left:8px;">${effect}</div>` : ""}
      </div>
    `;
  }).join("");

  return `
    <div style="margin-top:10px; padding-top:8px; border-top:1px solid #444;">
      <div style="color:#f6c; margin-bottom:4px;"><b>🪆 人形衣装</b></div>
      ${rows}
    </div>
  `;
}

// ★ 特殊装備UI更新
// ============================
function updateSpecialEquipUI(side, specialEquip) {

  // ★ 前回描画を完全に破棄（重要）
  document
    .querySelectorAll(`.special-equip-area[data-side="${side}"]`)
    .forEach(a => a.innerHTML = "");

  // どこに描画するか決定
  let area = null;

  if (!specialEquip) return;

  if (specialEquip.position === "under_doll") {
    area = document.querySelector(
      `.special-equip-area.doll[data-side="${side}"]`
    );
  } else {
    area = document.querySelector(
      `.special-equip-area[data-side="${side}"]:not(.doll)`
    );
  }

  if (!area) return;

  // 初期化
  area.innerHTML = "";

  if (!specialEquip.slots) return;

  for (const slot of specialEquip.slots) {

    const div = document.createElement("div");
    div.classList.add("special-equip-slot");

    // ロック枠
    if (!slot.unlocked) {
      div.classList.add("locked");
      div.textContent = "×";
      area.appendChild(div);
      continue;
    }

    // 空枠
    if (!slot.item) {
      div.classList.add("empty");
      div.textContent = slot.label;
      area.appendChild(div);
      continue;
    }

    // 装備あり
    div.classList.add("filled");
    div.classList.add("active"); // ★ ここで点灯

    // ★ 通常装備と同じく、ホバーで詳細が出るよう tooltip を内包
    const name = slot.item?.name ?? "不明な装備";
    const effect = slot.item?.effect_text ?? slot.item?.effect ?? "";
    const iconMarkup = getBattleEquipIconMarkup(slot.item, "special-equip-slot-icon");

    div.innerHTML = `
      ${iconMarkup}
      <div class="equip-tooltip">
        <b>${name}</b>
        ${effect ? `<br>${effect}` : ""}
      </div>
    `;

    area.appendChild(div);
  }
}

    case "def_up":   return "🛡️";
    case "atk_down": return "🗡️";
    case "def_down": return "🛡️";
    case "freeze":   return "❄️";
    case "onibi":    return "🔥";
    case "barrier":  return "🐢";
    case "karasu":   return "🐦";
    case "guts":     return "💢";

function updateBuffStrip(side, buffs) {
  const id = (side === "self") ? "buffStripSelf" : "buffStripEnemy";
  const area = document.getElementById(id);

  const list = Array.isArray(buffs) ? buffs : [];

  area.style.display = "flex";
  area.innerHTML = "";

  for (const b of list) {

    div.className = `buff-slot ${kind}`;

        <b>${b.source ?? "バフ"}</b>
        ${b.text ? `<br>${b.text}` : ""}

    area.appendChild(div);

function getClientNextLevelInfo(level, exp){
  const required = CLIENT_LEVEL_REQUIREMENTS[level] ?? null;
  if (required == null) {
    return {
      required: null,
      remaining: 0,
      label: "次Lv: MAX"
    };
  }

  const remaining = Math.max(0, required - Number(exp ?? 0));
  return {
    required,
    remaining,
    label: `次LvまでEXP: ${remaining}`
  };
}

// ============================
// ★ 鈴SE（WebAudio簡易生成：著作権フリー）
// ============================
function playBellSfx() {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;

  const ctx = new AudioCtx();
  ctx.resume?.();

  const now = ctx.currentTime + 0.02;

  // きらっとした倍音（短め）
  const freqs = [1760, 2640, 3520]; // A6 + 倍音
  const master = ctx.createGain();
  master.gain.value = 0.16;
  master.connect(ctx.destination);

  freqs.forEach((f, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.type = "sine";
    o.frequency.setValueAtTime(f, now);

    const t0 = now + i * 0.002;
    const t1 = t0 + 0.55;

    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(1.0, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t1);

    o.connect(g);
    g.connect(master);

    o.start(t0);
    o.stop(t1 + 0.02);
  });

  // 自動クローズ
  setTimeout(() => {
    try { ctx.close?.(); } catch {}
  }, 800);
}

const sfxTracks = {
  powerup: "BGM/SE/PowerUp23.wav",
  boom: "BGM/SE/Boom14.wav",
};

function playNamedSfx(name) {
  const src = sfxTracks[String(name ?? "").toLowerCase()];
  if (!src) return;

  if (String(name ?? "").toLowerCase() === "powerup") {
    window.lastPowerupSfxAt = Date.now();
  }

  try {
    const audio = new Audio(src);
    audio.preload = "auto";
    audio.volume = 0.82;
    audio.play().catch((err) => {
      console.warn("sfx play failed", name, err);
    });
  } catch (err) {
    console.warn("sfx create failed", name, err);
  }
}

function getAttackBuffScore(buffs) {
  return (Array.isArray(buffs) ? buffs : []).reduce((sum, buff) => {
    const kind = String(buff?.kind ?? "");
    if (kind === "atk_up" || kind === "mad") {
      return sum + Number(buff?.power ?? 0);
    }
    return sum;
  }, 0);
}

function maybePlayPowerupFromBuffs(side, buffs) {
  if (!side) return;

  const next = getAttackBuffScore(buffs);
  window.attackBuffScores ??= {};

  if (!(side in window.attackBuffScores)) {
    window.attackBuffScores[side] = next;
    return;
  }

  const prev = Number(window.attackBuffScores[side] ?? 0);
  window.attackBuffScores[side] = next;

  if (next > prev) {
    const last = Number(window.lastPowerupSfxAt ?? 0);
    if (Date.now() - last > 250) {
      playNamedSfx("powerup");
    }
  }
}

//   - 勝敗確定(battle_end)で停止
// ============================
const battleBgmTracks = [
  "BGM/バトルBGM/Rite_of_the_Falling_Rain.mp3",
  "BGM/バトルBGM/Steel_Clad_Rivalry.mp3"
];
let battleBgmAudio = null;

function stopBattleBgm() {
  try {
    if (battleBgmAudio) {
      battleBgmAudio.pause();
      battleBgmAudio.currentTime = 0;
      battleBgmAudio.src = "";
      battleBgmAudio.load?.();
      battleBgmAudio = null;
    }
  } catch {}
}

function playBattleBgm() {
  stopBattleBgm();
  if (!battleBgmTracks.length) return;

  const track = battleBgmTracks[Math.floor(Math.random() * battleBgmTracks.length)];
  const audio = new Audio(track);
  audio.loop = true;
  audio.volume = 0.55;
  audio.preload = "auto";

  battleBgmAudio = audio;
  audio.play().catch((err) => {
    console.warn("battle bgm play failed", err);
  });
}

// ============================
// ★ 勝利/敗北演出
//   - 著作権回避：WebAudioで簡易BGM（自作の短いメロディ）
// ============================
let resultBgmCtx = null;
let resultBgmNodes = [];

function stopResultBgm() {
  try {
    for (const n of resultBgmNodes) {
      try { n.stop?.(); } catch {}
      try { n.disconnect?.(); } catch {}
    }
    resultBgmNodes = [];
    if (resultBgmCtx) {
      resultBgmCtx.close?.();
      resultBgmCtx = null;
    }
  } catch {}
}

function playResultBgm(type) {
  stopResultBgm();

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;

  resultBgmCtx = new AudioCtx();
  resultBgmCtx.resume?.();

  const ctx = resultBgmCtx;
  const now = ctx.currentTime + 0.02;

  // victory: 明るい上昇 / defeat: 低めの下降
  const seq = (type === "win")
    ? [523.25, 659.25, 783.99, 1046.5, 783.99]   // C5 E5 G5 C6 G5
    : [392.00, 329.63, 261.63, 220.00, 196.00];  // G4 E4 C4 A3 G3

  const dur = 0.16;

  const master = ctx.createGain();
  master.gain.value = 0.12;
  master.connect(ctx.destination);

  for (let i = 0; i < seq.length; i++) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.type = "triangle";
    o.frequency.setValueAtTime(seq[i], now + i * dur);

    // エンベロープ（クリックノイズ抑制）
    const t0 = now + i * dur;
    const t1 = t0 + dur;
    g.gain.setValueAtTime(0.0, t0);
    g.gain.linearRampToValueAtTime(1.0, t0 + 0.03);
    g.gain.linearRampToValueAtTime(0.0, t1);

    o.connect(g);
    g.connect(master);

    o.start(t0);
    o.stop(t1 + 0.02);

    resultBgmNodes.push(o, g);
  }
}

function showResultOverlay(result) {
  const ov = document.getElementById("resultOverlay");
  const title = document.getElementById("resultTitle");
  const sub = document.getElementById("resultSub");

  if (!ov || !title || !sub) return;

  if (result === "win") {
    title.textContent = "VICTORY";

  } else if (result === "lose") {
    title.textContent = "DEFEAT";
    sub.textContent = "敗北しました";
    playResultBgm("lose");
  } else {
    title.textContent = "DRAW";
    sub.textContent = "引き分け";
  }

  ov.style.display = "flex";
}

}

// ★ WebSocket 受信処理 共通化（CPU戦 / 対人 共通）
// ============================================
function attachWsHandlers() {

  ws.onerror = (e) => {
    appendLog("systemBox", "system-log", "❌ サーバー接続に失敗しました");
    console.error("WebSocket error:", e);

    // ★ 接続失敗時の保険処理
    isConnecting = false;

    const btn = document.getElementById("btnConnectPhase1");
    if (btn) btn.disabled = false;

    stopMatchTimer();
    clearCpuFailTimer();

    const status = document.getElementById("connectStatus");
    if (status) status.textContent = "接続に失敗しました";
  };


  ws.onmessage = (msg) => {
    console.log("[WS RECEIVE RAW]", msg.data);

    const data = JSON.parse(msg.data);

    // ★ マッチ成立 → フェーズ2へ
    if (data.type === "match_start") {

      // ★ 職業詳細ポップアップを強制的に閉じる
      closeJobDetail();

      // ★ マッチング成立演出（中央3秒 + 鈴SE）
      showCenterToast("マッチングしました", 3000);
      playBellSfx();

      // ★ 対戦中BGM（Hiphop系：自作WebAudio）開始
      playBattleBgm();



      // ★ 接続完了なのでフラグ解除
      isConnecting = false;

      stopMatchTimer();
      clearCpuFailTimer();

      const btn = document.getElementById("btnConnectPhase1");
      if (btn) btn.disabled = false;

      const status = document.getElementById("connectStatus");
      if (status) status.textContent = "";

      setPhase(PHASE.BATTLE);

      // ★ ラウンド/ターンカウンタ初期化
      resetRoundTurnCounter();
      return;
    }

    // ★ サーバからのポップアップ通知
    if (data.type === "popup") {
      showCenterToast(data.msg ?? "", Number(data.ms ?? 2500));
      if (data.sfx === "bell") playBellSfx();
      return;
    }

    if (data.type === "sfx") {
      playNamedSfx(data.name);
      return;
    }


    // ===============================
    // ↓↓↓ ここから下は「元の ws.onmessage の中身」を
    //     そのまま全部コピペして置き換える ↓↓↓
    // ===============================
    // 人形使い：着せ替え部位選択（簡易UI）
    if (data.type === "request_doll_part_select") {

      const parts = [
        { key: "head", label: "帽子" },
        { key: "body", label: "服" },
        { key: "leg",  label: "ズボン" },
        { key: "foot", label: "靴" }

      const popup = document.getElementById("skillPopup");

      let html = `<div style="font-weight:bold; margin-bottom:8px;">

            ${p.label}
          </button><br>
        `;
      }

      list.innerHTML = html;
      popup.style.display = "flex";
      return;
    }


    if (data.type === "status_simple") {

      // ================================
      // ★ スキル残り回数（self側のみ）
      // ================================
      if (data.side === "self" && data.skill_remaining) {
        window.skillRemaining = data.skill_remaining;
      }




      const box =

      }
      return;
    }

    /* --- EXP --- */
    if (data.type === "exp_info") {
      const expEl = document.getElementById("exp");
      if (expEl) {
        expEl.textContent = data.exp;
      }
      return;
    }


    /* --- レベル情報 --- */
    if (data.type === "level_info") {
      myLevel = data.level;

      const levelEl = document.getElementById("level");
      if (levelEl) {
        levelEl.textContent = "Lv " + data.level;
      }

      const lvupBtn = document.getElementById("lvupBtn");
      if (lvupBtn) {
        lvupBtn.disabled = !myTurn;
      }

      return;
    }



    if (data.type === "item_list") {
      window.itemList = data.items;
      window.itemUsesRemaining = Math.max(0, Number(data.item_uses_remaining ?? 2));

      // ★「開いているときだけ」再描画
      if (isItemUIOpen && currentItemCategory !== null) {
        openItemCategory(currentItemCategory);
      }
      return;
    }


    
    if (data.type === "status_info") {

      window.arrowSlots = data.arrow_slots ?? 1;
      const isOnmyoji = (window.myJob === "陰陽師");

      // ---------------------------
      // 式神表示（陰陽師）
      // ---------------------------
      let shikiHTML = "";
      if (isOnmyoji) {
        shikiHTML = `
          <div id="shikigami-list" style="margin-top:8px; font-size:12px; color:#6cf;">
            ${
              !data.shikigami || data.shikigami.length === 0
                ? "（式神なし）"
                : data.shikigami.map(s => `${s}`).join("<br>")
            }
          </div>
        `;
      }

      // ---------------------------
      // 人形表示（人形使い）
      // ---------------------------
      let dollHTML = "";
      if (data.doll) {
        const state = data.doll.is_broken ? "（破壊）" : "";
        dollHTML = `
          <hr>
          <div style="margin-top:6px; color:#f6c;">
            🪆 人形耐久：${data.doll.durability} / ${data.doll.max_durability} ${state}
          </div>
        `;
      }

      const panel = document.getElementById("status-panel");
      if (!panel) return;

      panel.innerHTML = `
        攻撃力：${data.attack}<br>
        防御力：${data.defense}<br>

        <div id="buff-list" style="margin-top:8px; font-size:12px; color:#ccc;">
          ${
            data.buffs.length === 0
              ? "（バフなし）"
              : data.buffs.map(b => `${b}`).join("<br>")
          }
        </div>

        ${shikiHTML}
        ${dollHTML}
      `;

      return;
    }





    // ★追加：ショップ商品リスト受信
    if (data.type === "shop_list") {
        renderShop(data.items);
        return;
    }


    /* --- コイン --- */
    if (data.type === "coin_info") {
      const coinEl = document.getElementById("coins");
      if (coinEl) {
        coinEl.textContent = data.coins;
      }
      return;
    }

    /* --- 自分のラウンド --- */
    if(data.type==="your_turn"){
      myTurn = true;
      appendLog("systemBox","system-log", data.msg);

      // ★ 自分のターン開始：ラウンド +1 / ターン +1
      roundCount++;
      turnCount++;
      updateRoundTurnUI();

      document.getElementById("atkBtn").disabled = false;
      document.getElementById("skillBtn").disabled = false;
      document.getElementById("lvupBtn").disabled = false; // 常に押せる
      document.getElementById("itemBtn").disabled = false;
      document.getElementById("shopBtn").disabled = false;

      return;
    }

    /* --- 相手ラウンド --- */
    if(data.type==="wait_turn"){
      myTurn = false;
      appendLog("systemBox","system-log", data.msg);

      // ★ 相手のターン開始：ターン +1
      turnCount++;
      updateRoundTurnUI();

// ★ 相手ラウンドになったらショップを強制的に閉じる
      closeShopUI();

      document.getElementById("atkBtn").disabled = true;
      document.getElementById("skillBtn").disabled = true;
      document.getElementById("lvupBtn").disabled = true;
      document.getElementById("itemBtn").disabled = true;
      document.getElementById("shopBtn").disabled = true;


      return;
    }



    // ============================
    // ★ 勝敗確定（演出用）
    // ============================
    if (data.type === "battle_end") {
      battleEnded = true;

      // ★ 対戦中BGM停止
      stopBattleBgm();
      const backBtn = document.getElementById("btnBackToMenu");
      if (backBtn) backBtn.style.display = "inline-block";

      // 既存UIを閉じる（安全策）
      closeShopUI();
      closeItemUI();

      setTimeout(() => {
        showResultOverlay(data.result);
      }, 900);
      return;
    }

    /* --- 戦闘ログ（表示専用） --- */
    if (data.type === "battle_log") {
      appendLog("battleBox", "battle-log", data.msg);

      // ★ 勝敗確定ログを検知（server.js の実文言に完全一致）
      if (
        data.msg.includes("の勝利！！") ||
        data.msg.includes("引き分け！")
      ) {
        battleEnded = true;
        document.getElementById("btnBackToMenu").style.display = "inline-block";
      }

      return;
    }
    if (data.type === "battle_log") {
      const div = document.createElement("div");
      div.textContent = data.msg;
      
      // ⚔️や💥が含まれる、またはダメージという言葉があれば演出実行
      if (data.msg.includes("⚔️") || data.msg.includes("💥") || data.msg.includes("ダメージ")) {
        triggerHitEffect();
        div.style.color = "#ff6666";
        div.style.fontWeight = "bold";
      }
      
      battleBox.appendChild(div);
      battleBox.scrollTop = battleBox.scrollHeight;
    }
    // ============================
    // ★ ダメージ演出（damage_event）
    // ============================
    if (data.type === "damage_event") {
      console.log("★ damage_event 到達", data);
      const sprites = getSprites();

      const targetSprite = sprites[data.target];

      // ★ ここを追加
      if (!targetSprite) {
        console.warn("damage_event: invalid target", data.target, sprites);
        return;
      }

      const attackerSprite =
        data.target === "self" || data.target === "self_doll"
          ? sprites.enemy
          : sprites.self;

      if (attackerSprite) attackerSprite.classList.add("attack");
      targetSprite.classList.add("hit");

      setTimeout(() => {
        if (attackerSprite) attackerSprite.classList.remove("attack");
        targetSprite.classList.remove("hit");
      }, 280);

      const offsetPx = bumpStack(data.target);
      const kind = data.kind ?? "normal";
      const amount = Number(data.amount ?? 0);

      spawnPopup(
        targetSprite,
        `damage-popup kind-${kind}`,
        amount ? `-${amount}` : "-",
        offsetPx
      );
      return;
    }


    // ============================
    // ★ 回復演出（heal_event）
    // ============================
    if (data.type === "heal_event") {
      const sprites = getSprites();
      const targetSprite = sprites[data.target];

      if (targetSprite) targetSprite.classList.add("heal");

      setTimeout(() => {
        if (targetSprite) targetSprite.classList.remove("heal");
      }, 480);

      const offsetPx = bumpStack(data.target);
      const amount = Number(data.amount ?? 0);

      spawnPopup(
        targetSprite,
        "heal-popup",
        amount ? `+${amount}` : "+",
        offsetPx
      );
      return;
    }

    if (data.type === "shikigami_summon") {
      showShikigamiSummonEvent(data);
      return;
    }

    if (data.type === "shikigami_special") {
      showShikigamiSpecialEvent(data);
      return;
    }

    if(data.type==="skill_log"){
      appendLog("battleBox","skill-log",data.msg);
      return;
    }

    /* --- システム --- */
    if(data.type==="system_log"){
      appendLog("systemBox","system-log",data.msg);
      return;
    }

    /* --- エラー --- */
    if(data.type==="error_log"){
      appendLog("systemBox","error-log",data.msg);
      return;
    }

    /* --- デバッグ --- */
    if(data.type==="debug_log"){
      appendLog("debugBox","debug-log",data.msg);
      return;
    }

    /* --- level_up_request の返信 --- */
    if(data.type==="level_up_check"){
      if (data.isMax) {
        showCenterToast("最大レベルです", 2200);
        return;
      }
      if(data.canExp){
        openItemConfirm("EXPを消費してレベルアップしますか？", () => {
          ws.send(JSON.stringify({type:"level_up_exp"}));
        }, {
          title: "レベルアップ確認",
          okLabel: "レベルアップ",
          cancelLabel: "キャンセル"
        });
        return;
      }
      if(data.canCoins){
        openItemConfirm(`EXPが不足しています。\nコイン${data.needCoins}で補填してレベルアップしますか？`, () => {
          ws.send(JSON.stringify({type:"level_up_coins"}));
        }, {
          title: "レベルアップ確認",
          okLabel: "コインで補填",
          cancelLabel: "キャンセル"
        });
        return;
      }
      showCenterToast("コインが足りません", 2500);
      return;
    }

    // ---------- アイテム使用結果 ----------
    if (data.type === "use_item_result") {
        if (data.success) {
            // 正常使用 → アイテムUIを閉じて行動に戻る
            closeItemUI();
        } else {
            // 失敗 → カテゴリ選択に戻す
            document.getElementById("itemCategoryPopup").style.display = "flex";
            if (data.message) {
                alert(data.message);
            }
        }
        return;
    }

  };
}

/* ================= スキル系 ================= */
function openSkillUI(){
  const list = document.getElementById("skillList");
  list.innerHTML = "";

  const jobId = myJob;


  if (!SKILLS[jobId]) {
    console.error("スキル定義が見つかりません:", myJob, jobId);
    return;
  }


  SKILLS[jobId].forEach((s, i) => {
    const needLv = i + 1;

    const row = document.createElement("div");
    row.className = "skillRow";

    const isDoll = (myJob === "人形使い" || myJob === 9);
    const isDollSkill1 = isDoll && i === 0;
    const isDollSkill2 = isDoll && i === 1;
    const isDollSkill3 = isDoll && i === 2;

    // ← ここが差し替え部分
    const nameDiv = document.createElement("div");
    nameDiv.className = "skillName";
    nameDiv.textContent = `【${i+1}】${s.name}`;

    const descDiv = document.createElement("div");
    descDiv.className = "skillDesc";
    descDiv.textContent = s.desc;

    const btn = document.createElement("button");
    const remain = Number(window.skillRemaining?.[i + 1] ?? 1);

    // ★ 使用回数が0でも「押したらポップアップ」を出す（要件）
    if (remain <= 0) {
      btn.textContent = "使用";
      btn.classList.add("used-up");
      btn.addEventListener("click", () => {
        showCenterToast("スキルの使用回数がなくなりました", 2500);
      });
    } else {
      btn.textContent = "使用";
    }

    // ★ レベル未解放は優先的に押せない（表示文言はそのまま）
    if (myLevel < needLv) btn.disabled = true;

    // ★ 使用回数が残っている場合のみ、実際の発動処理を紐付ける
    if (remain > 0) {
      if (isDollSkill1) {
        btn.addEventListener("click", useDollSkill1);
      } else if (isDollSkill2) {
        btn.addEventListener("click", useDollSkill2Prompt);
      } else if (isDollSkill3) {
        btn.addEventListener("click", useDollSkill3);
      } else {
        btn.addEventListener("click", () => useSkill(i + 1));
      }
    }

    row.appendChild(nameDiv);
    row.appendChild(descDiv);
    row.appendChild(btn);

    list.appendChild(row);
  });

  document.getElementById("skillPopup").style.display = "flex";
}




function closeSkillUI(){
  document.getElementById("skillPopup").style.display="none";
}

function useSkill(num){
  if(!myTurn) return;

    window.arrowSlots = 2;

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function getInventoryActionMeta(it, category){
  if (
    category === "item" ||
    (category === "special" && it?.name === "修理キット")
  ) {
    return {
      label: "使用",
      onclick: `useItem('${escapeHtml(it?.uid)}','use')`
    };
  }

  return {
    label: "装備",
    onclick: `onEquipButtonByUid('${escapeHtml(it?.uid)}')`
  };
}

function renderInventoryCard(it, category){
  const desc = escapeHtml(it?.effect_text ?? "");
  const name = escapeHtml(it?.name ?? "不明なアイテム");
  const { icon, badges, theme, metaClass } = getShopVisualMeta(it);
  const badgeHtml = badges
    .map(b => `<span class="shop-badge kind-${escapeHtml(b.kind)}">${escapeHtml(b.label)}</span>`)
    .join("");
  const action = getInventoryActionMeta(it, category);

  return `
    <div class="shop-card inventory-card ${theme}">
      <div class="shop-card-main">
        <div class="shop-card-head">
          <div class="shop-icon">${getShopIconMarkup(icon)}</div>
          <div class="shop-title-wrap">
            <div class="shop-item-name">${name}</div>
            <div class="shop-meta-row ${escapeHtml(metaClass ?? "")}">${badgeHtml}</div>
            <div class="shop-item-desc">${desc || "効果説明なし"}</div>
          </div>
        </div>
      </div>
      <div class="shop-buy-area">
        <button onclick="${action.onclick}">${escapeHtml(action.label)}</button>
      </div>
    </div>
  `;
}

function getShopIconMarkup(icon){
  if (icon && typeof icon === "object" && icon.type === "image" && icon.src) {
    return `<img src="${escapeHtml(icon.src)}" alt="${escapeHtml(icon.alt ?? "")}">`;
  }
  return escapeHtml(icon ?? "");
}

function getBattleEquipIconMarkup(item, className){
  if (!item || typeof item === "string") {
    return escapeHtml(String(item ?? ""));
  }

  const { icon } = getShopVisualMeta(item);
  return `<div class="${escapeHtml(className)}">${getShopIconMarkup(icon)}</div>`;
}

function getShopItemStar(it){
  if (Number.isFinite(Number(it?.star))) return Number(it.star);
  const name = String(it?.name ?? "");
  const match = name.match(/★\s*(\d+)/);
  if (match) return Number(match[1]);
  return 1;
}

function getShopVisualMeta(it){
  const star = Math.max(1, Math.min(3, getShopItemStar(it)));
  const badges = [];
  let icon = "🧰";
  let theme = "theme-bronze";
  let showStarBadge = false;
  let metaClass = "";
  const mageEquipIcons = {
    "魔導士の杖": { type: "image", src: "Assets/特殊装備/madousinotue.png", alt: "魔導士の杖" },
    "魔力の指輪": { type: "image", src: "Assets/特殊装備/madousinoyubiwa.png", alt: "魔力の指輪" },
    "魔導士のローブ": { type: "image", src: "Assets/特殊装備/madousinoro-bu.png", alt: "魔導士のローブ" },
    "古代魔導書": { type: "image", src: "Assets/特殊装備/kodainomadousho.png", alt: "古代魔導書" },
  };

  if (star === 2) {
    theme = "theme-silver";
  } else if (star >= 3) {
    theme = "theme-gold";
  }

  if (it?.is_onmyoji_item) {
    icon = { type: "image", src: "Assets/特殊装備/sikigaminohuda.png", alt: String(it?.name ?? "式神のお札") };
    theme = "theme-rainbow";
    badges.push({ label: "陰陽師", kind: "job" });
    badges.push({ label: "召喚札", kind: "special" });
    badges.push({ label: it.shikigami_rank === "high" ? "上級式神" : "下級式神", kind: "rank" });
  } else if (it?.is_mage_item) {
    icon = "🧪";
    showStarBadge = true;
    metaClass = "nowrap";
    if (String(it?.name ?? "").includes("魔力水(中)") || String(it?.name ?? "").includes("魔力水（中）")) {
      theme = "theme-silver";
    } else if (String(it?.name ?? "").includes("魔力水(大)") || String(it?.name ?? "").includes("魔力水（大）")) {
      theme = "theme-gold";
    } else {
      theme = "theme-bronze";
    }
    badges.push({ label: "魔導士", kind: "job" });
    badges.push({ label: "専用アイテム", kind: "special" });
  } else if (it?.equip_type === "mage_equip") {
    icon = mageEquipIcons[String(it?.name ?? "")] ?? "🔮";
    theme = "theme-rainbow";
    badges.push({ label: "魔導士", kind: "job" });
    badges.push({ label: "専用装備", kind: "special" });
  } else if (it?.is_doll_item) {
    icon = "🪡";
    theme = "theme-rainbow";
    badges.push({ label: "人形使い", kind: "job" });
    badges.push({ label: "特殊アイテム", kind: "special" });
  } else if (it?.is_doll_costume) {
    icon = "🎎";
    showStarBadge = true;
    badges.push({ label: "人形使い", kind: "job" });
    badges.push({ label: "衣装", kind: "special" });
  } else if (it?.is_arrow || it?.equip_type === "arrow") {
    icon = "🏹";
    theme = "theme-rainbow";
    badges.push({ label: "弓兵", kind: "job" });
    badges.push({ label: "特殊装備", kind: "special" });
  } else if (it?.equip_type === "alchemist_unique") {
    icon = "⚗️";
    theme = "theme-rainbow";
    badges.push({ label: "錬金術師", kind: "job" });
    badges.push({ label: "特製装備", kind: "special" });
  } else if (it?.is_equip) {
    showStarBadge = true;
    if (it?.effect_type === "coin_per_turn" || it?.equip_category === "coin") {
      icon = "💰";
    } else if (String(it?.effect_type ?? it?.equip_category ?? "").includes("攻撃")) {
      icon = "⚔️";
    } else if (String(it?.effect_type ?? it?.equip_category ?? "").includes("防御")) {
      icon = "🛡️";
    } else {
      icon = "🧱";
    }
    badges.push({ label: "通常装備", kind: "normal" });
  } else {
    showStarBadge = true;
    if (String(it?.effect_type ?? "").includes("HP")) {
      icon = "❤️";
    } else if (String(it?.effect_type ?? "").includes("攻撃")) {
      icon = "🗡️";
    } else if (String(it?.effect_type ?? "").includes("防御")) {
      icon = "🛡️";
    } else {
      icon = "🧪";
    }
    badges.push({ label: "通常アイテム", kind: "normal" });
  }

  if (showStarBadge) {
    badges.push({ label: `★${star}`, kind: "rank" });
  }

  return { icon, badges, theme, metaClass };
}

function renderShop(items){
  const box = document.getElementById("shopList");
  box.innerHTML = "";

  items.forEach((it, idx) => {
    if (!it) return;

    const desc = escapeHtml(it.effect_text ?? "");
    const name = escapeHtml(it.name ?? "不明なアイテム");
    const { icon, badges, theme, metaClass } = getShopVisualMeta(it);
    const badgeHtml = badges
      .map(b => `<span class="shop-badge kind-${escapeHtml(b.kind)}">${escapeHtml(b.label)}</span>`)
      .join("");

    box.innerHTML += `
      <div class="shop-card ${theme}">
        <div class="shop-card-main">
          <div class="shop-card-head">
            <div class="shop-icon">${getShopIconMarkup(icon)}</div>
            <div class="shop-title-wrap">
              <div class="shop-item-name">${name}</div>
              <div class="shop-meta-row ${escapeHtml(metaClass ?? "")}">${badgeHtml}</div>
              <div class="shop-item-desc">${desc || "効果説明なし"}</div>
            </div>
          </div>
        </div>
        <div class="shop-buy-area">
          <div class="shop-price">${Number(it.price ?? 0)} コイン</div>
          <button onclick="buyItem(${idx})">購入</button>
        </div>
      </div>
    `;
  });

  document.getElementById("shopPopup").style.display = "flex";
}

function openArrowSlotSelect(item) {
  pendingArrowItem = item;

  // slot2 が使えるかは「最後に受信した値」で判断
  if (window.arrowSlots >= 2) {
    const slot = confirm(
      "どちらのスロットに装備しますか？\nOK: スロット2 / キャンセル: スロット1"
    )
      ? 2
      : 1;

    useItem(item.uid, "arrow", slot);
  } else {
    useItem(item.uid, "arrow", 1);
  }

  pendingArrowItem = null;
}
function onEquipButton(item) {
 

  // ===== 矢判定（名前 or 装備種別で判断）=====
  const isArrow =
    item.equip_type?.includes("arrow") ||
    item.name?.includes("矢");

  if (isArrow) {

    // slot2 が使えるなら選ばせる
    if (window.arrowSlots >= 2) {
      const slot = confirm(
        "スロット2に装備しますか？\nOK: スロット2 / キャンセル: スロット1"
      )
        ? 2
        : 1;

      useItem(item.uid, "arrow", slot);
    } else {
      useItem(item.uid, "arrow", 1);
    }
    return; // ★ ここで必ず終了
  }

  // ★ 人形衣装は special 扱い
  if (item.is_doll_costume) {
    useItem(item.uid, "special");
    return;
  }

  // 以下は今まで通り
  if (
    item.equip_type === "mage_equip" ||
    item.equip_type === "alchemist_unique"
  ) {
    useItem(item.uid, "special");
  } else {
    useItem(item.uid, "equip");
  }
}

// ============================
// ★ ツールチップ：PC=hover / スマホ=tap で表示
//   - 装備枠 / 特殊装備枠 / バフ枠
//   - 画面の別の場所タップで閉じる
// ============================
function closeAllTooltips(exceptEl = null) {
  document.querySelectorAll('.tooltip-open').forEach(el => {
    if (exceptEl && (el === exceptEl || el.contains(exceptEl) || exceptEl.contains(el))) return;
    el.classList.remove('tooltip-open');
  });
}

function setupTapTooltips() {
  document.addEventListener('pointerdown', (e) => {
    const t = e.target;
    const slot = t.closest('.equip-slot, .special-equip-slot, .buff-slot');

    // どの枠でもない → 全部閉じる
    if (!slot) {
      closeAllTooltips();
      return;
    }

    // ツールチップが無い枠は無視（空枠など）
    const hasTooltip = slot.querySelector('.equip-tooltip, .buff-tooltip');
    if (!hasTooltip) return;

    // ツールチップ自体をタップした場合は閉じない
    if (slot.classList.contains('tooltip-open') && t.closest('.equip-tooltip, .buff-tooltip')) {
      e.stopPropagation();
      return;
    }

    const willOpen = !slot.classList.contains('tooltip-open');
    closeAllTooltips(slot);

    if (willOpen) slot.classList.add('tooltip-open');
    else slot.classList.remove('tooltip-open');

    // 直後の click で閉じないように
    e.stopPropagation();
  }, true);

  // スクロールやリサイズ時も閉じる（画面外に残るのを防ぐ）
  window.addEventListener('scroll', () => closeAllTooltips(), true);
  window.addEventListener('resize', () => closeAllTooltips(), true);
}

document.getElementById("btnConnectPhase1").onclick = () => {

    alert("職業を選択してください");
    return;
  }

  if (window.matchMode === "room") {
    const roomCode = (document.getElementById("roomCodeInput")?.value ?? "").trim();
    if (!/^\d{4}$/.test(roomCode)) {
      alert("ルーム番号は4桁の数字で入力してください");
      return;
    }
  }

  isConnecting = true;
  document.getElementById("btnConnectPhase1").disabled = true;

  clearCpuFailTimer();

  if (window.matchMode === "cpu") {
    document.getElementById("connectStatus").textContent = "CPUと接続中...";
    joinCpu();
    return;
  }

  // random / room
  startMatchTimer();

  if (window.matchMode === "room") {
    joinRoom();
  } else {
    // random
    join();
  }
};
