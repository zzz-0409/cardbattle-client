<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>オンライン対戦（完全版）</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #202020;
      color: #f5f5f5;
    }
    button { padding: 5px 12px; cursor:pointer; }
    button:disabled { background:#666; cursor:default; }

    .log-container { display: flex; gap: 12px; margin-top: 10px;}
    .log-box {
      flex: 1; background:#111; border-radius:6px;
      padding:6px; height:220px; overflow-y: auto;
      font-size: 12px; font-family: Consolas;
    }
    .battle-log{ color:#ffd54f;}
    .skill-log{ color:#81d4fa;}
    .system-log{ color:#a5d6a7;}
    .error-log{ color:#ef9a9a;}
    .debug-log{ color:#b0bec5;}

    #skillPopup{
      display:none; position:fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(0,0,0,0.7);
      justify-content:center; align-items:center;
    }
    #skillBox{
      background:#2b2b2b; padding:20px; border-radius:10px;
      width:380px;
    }
    .skillRow{ margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #555;}
    .skillName{ color:#81d4fa; font-size:16px; }
    .skillDesc{ white-space:pre-line; font-size:13px; color:#ddd; }


   
    /* ===== 簡易ステータス全体 ===== */
    .status-area {
      margin-top: 15px;
      margin-bottom: 15px;
      display: flex;
      gap: 12px;
    }

    /* ===== 自分 / 相手 共通 ===== */
    .status-simple {
      width: 240px;
      padding: 10px;
      background: #222;
      border: 1px solid #555;
      color: #fff;
      font-size: 13px;
    }

    /* ===== 相手側は少し色を変える ===== */
    #enemy-status-simple {
      background: #1a1a1a;
      border-color: #666;
    }
    

#phase0 {
  text-align: center;
}

#phase0 .subtitle {
  font-size: 1.00em;
  letter-spacing: 0.25em;
  opacity: 0.8;
  margin-top: -20px; 
  margin-bottom: 30px;
}




  </style>
</head>

<body>
<!-- ================= フェーズ0：モード選択 ================= -->
<div id="phase0">
  <h1>Guild System</h1>
  <div class="subtitle">ギルドシステム</div>

  <button id="btnRandom">ランダム対戦</button><br><br>
  <button disabled>ルーム対戦（未実装）</button><br><br>
  <button id="btnCPU">CPU戦</button><br><br>
  <button disabled>レイド戦（未実装）</button>
</div>


<!-- ================= フェーズ1：ランダム対戦準備 ================= -->
<div id="phase1" style="display:none;">
  <h2>ランダム対戦</h2>
  <input id="name_phase1" placeholder="名前">
  <button id="btnConnectPhase1">接続</button>
  <button id="btnCancelRandom">タイトルに戻る</button>
  <p id="connectStatus"></p>
<select id="job_phase1">
  <option value="1">戦士</option>
  <option value="2">騎士</option>
  <option value="3">僧侶</option>
  <option value="4">盗賊</option>
  <option value="5">魔導士</option>
  <option value="6">陰陽師</option>
  <option value="7">錬金術師</option>
  <option value="8">弓兵</option>
  <option value="9">人形使い</option>
</select>
<!-- ========================= -->
<!-- CPU職業選択（CPU戦のみ表示） -->
<!-- ========================= -->
<div id="cpuJobArea" style="margin-top:8px; display:none;">
  <label for="cpuJob">CPUの職業：</label>
  <select id="cpuJob">
    <option value="">ランダム</option>
    <option value="戦士">戦士</option>
    <option value="騎士">騎士</option>
    <option value="僧侶">僧侶</option>
    <option value="盗賊">盗賊</option>
    <option value="魔導士">魔導士</option>
    <option value="弓兵">弓兵</option>
    <option value="陰陽師">陰陽師</option>
    <option value="錬金術師">錬金術師</option>
    <option value="人形使い">人形使い</option>
  </select>
</div>

  
</div>
<button id="btnBackToMenu"
        style="display:none; margin-bottom:10px;">
  タイトルに戻る
</button>

<!-- ================= フェーズ2：バトル画面 ================= -->
<div id="phase2" style="display:none;">

  <h2>オンライン対戦（完全版）</h2>

<!-- ================= プレイヤー情報入力 ================= -->
<input id="name" placeholder="名前">
<select id="job">
  <option value="1">戦士</option>
  <option value="2">騎士</option>
  <option value="3">僧侶</option>
  <option value="4">盗賊</option>
  <option value="5">魔導士</option>
  <option value="6">陰陽師</option>
  <option value="7">錬金術師</option>
  <option value="8">弓兵</option>
  <option value="9">人形使い</option>

</select>
<button onclick="join()">接続</button>


<!-- ===== 簡易ステータス（自分 / 相手） ===== -->
<div class="status-area">
  <div id="my-status-simple" class="status-simple"></div>
  <div id="enemy-status-simple" class="status-simple"></div>
</div>

<h3>行動</h3>
<button id="atkBtn" disabled onclick="attack()">攻撃</button>
<button id="skillBtn" disabled onclick="openSkillUI()">スキル</button>
<button id="lvupBtn" disabled onclick="tryLevelUp()">レベルアップ</button>
<button id="itemBtn" disabled onclick="openItemUI()">アイテム</button>
<button id="shopBtn" disabled onclick="openShop()">ショップ</button>



<h3>ログ</h3>
<div class="log-container">
  <div class="log-box" id="battleBox"><div class="log-title">⚔ 戦闘ログ</div></div>
  <div class="log-box" id="systemBox"><div class="log-title">▶ システムログ</div></div>
  <div class="log-box" id="debugBox"><div class="log-title">🛠 デバッグログ</div></div>
</div>

<!-- ================= スキルポップアップ ================= -->
<div id="skillPopup">
  <div id="skillBox">
    <h3>スキル一覧</h3>
    <div id="skillList"></div>
    <button onclick="closeSkillUI()">閉じる</button>
  </div>
</div>

<!-- ▼ カテゴリ選択ポップアップ（新規追加） -->
<div id="itemCategoryPopup"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
  <div style="background:#2b2b2b; padding:20px; border-radius:10px; width:260px;">
    <h3>カテゴリ選択</h3>
    <button onclick="openItemCategory('item')">アイテム</button><br><br>
    <button onclick="openItemCategory('equip')">装備</button><br><br>
    <button onclick="openItemCategory('special')">特殊装備</button><br><br>
    <button onclick="closeItemCategory()">閉じる</button>
  </div>
</div>

<!-- ================= アイテムポップアップ ================= -->
<div id="itemPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
  <div id="itemBox" style="background:#2b2b2b; padding:20px; border-radius:10px; width:380px;">
    <h3 id="itemPopupTitle">アイテム一覧</h3>
    <div id="itemList"></div>
    <button onclick="closeItemUI()">閉じる</button>
  </div>
</div>

<!-- ★ 追加：ショップポップアップ -->
<div id="shopPopup" class="popup" style="display:none;">
  <div class="popup-inner">
      <h3>ショップ</h3>

      <div id="shopList"></div>

      <!-- ★ ここに移動させる（popup と連動して消える） -->
      <button onclick="rerollShop()">ショップ更新(10コイン)</button>
      <button onclick="closeShopUI()">閉じる</button>

  </div>
</div>

<!-- ================= ステータス詳細ポップアップ ================= -->
<div id="statusDetailPopup"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">

  <div style="background:#2b2b2b; padding:20px; border-radius:10px; width:420px;">
    <h3 id="statusDetailTitle">ステータス詳細</h3>

    <div id="statusDetailBody" style="font-size:13px; line-height:1.6;"></div>

    <div style="text-align:right; margin-top:10px;">
      <button onclick="closeStatusDetail()">閉じる</button>
    </div>
  </div>
</div>


<script>
// ==================== フェーズ管理 ====================
const PHASE = {
  MODE_SELECT: 0,
  RANDOM_READY: 1,
  BATTLE: 2
};

let currentPhase = PHASE.MODE_SELECT;

function setPhase(p) {
  currentPhase = p;

  document.getElementById("phase0").style.display =
    p === PHASE.MODE_SELECT ? "block" : "none";

  document.getElementById("phase1").style.display =
    p === PHASE.RANDOM_READY ? "block" : "none";

  document.getElementById("phase2").style.display =
    p === PHASE.BATTLE ? "block" : "none";
}

/* ====================
   グローバル変数
==================== */

let currentItemCategory = null;
let isItemUIOpen = false; // ★ 追加
let ws;
let myTurn = false;
let myJob = null;
let myLevel = 1;
let pendingArrowItem = null;   // ★ 追加：装備待ちの矢
let battleEnded = false;

// ==================== 環境自動判定 ====================
// ローカル（file://, localhost）かどうか
const IS_LOCAL =
  location.protocol === "file:" ||
  location.hostname === "localhost";

// WebSocket 接続先を自動切替
const WS_URL = IS_LOCAL
  ? "ws://localhost:8080"
  : "wss://cardbattle-server.onrender.com";

console.log("ENV:", IS_LOCAL ? "LOCAL" : "PRODUCTION");
console.log("WS_URL:", WS_URL);

// 職業名 → スキルID 変換
const JOB_ID_MAP = {
  "戦士": 1,
  "騎士": 2,
  "僧侶": 3,
  "盗賊": 4,
  "魔導士": 5,
  "陰陽師": 6,
  "錬金術師": 7,
  "弓兵": 8,
  "人形使い": 9
};

/* ================= スキル定義（あなたの仕様そのまま） ================= */
const SKILLS = {
  1:[ {name:"パワースラッシュ",desc:"防御無視20ダメージ。"},
      {name:"ブレイブチャージ",desc:"防御無視30＋攻撃+3（3R）"},
      {name:"ラストブレード",desc:"防御無視(10＋自身の攻撃力分ダメージ増加)"} ],
  2:[ {name:"シールドブレイク",desc:"20＋防御+2（4R）"},
      {name:"アイアンチャージ",desc:"15＋防御力＋防御+4（3R）"},
      {name:"ジャスティスブレード",desc:"25＋自身の防御力分ダメージ増加"} ],
  3:[ {name:"ヒール",desc:"HP27回復"},
      {name:"ディスペルヒール",desc:"HP32＋デバフ解除"},
      {name:"グレーターヒール",desc:"HP37＋デバフ解除"} ],
  4:[ {name:"スラッシュ＆スティール",desc:"25＋盗む"},
      {name:"ダガーレイド",desc:"25+(アイテム数×2)+盗む"},
      {name:"シャドウバースト",desc:"所持アイテムをコピーして全発動"} ],
  5:[ {name:"魔力チャージ",desc:"魔力+20（1回のみ）"},
      {name:"エレメントバースト",desc:"魔力30消費・30ダメージ"},
      {name:"メテオインパクト",desc:"魔力全消費→消費魔力-30ダメージ(必要魔力60以上)"} ],
  6:[ {name:"式神召喚・初級",desc:"鬼火/猫又/玄武/烏天狗"},
      {name:"式神召喚・上級",desc:"九尾/白龍含む式神1体"},
      {name:"二重召喚",desc:"式神2体同時召喚"} ],
  7:[ {name:"錬成",desc:"装備を2つ生成"},
      {name:"精錬",desc:"全装備★+1"},
      {name:"三重合成",desc:"装備3つ合成→特殊武器生成"} ],
  8:[ {name:"集中射撃",desc:"3R追撃+1"},
      {name:"狙い撃ち＋矢拡張",desc:"矢の装備枠+1＆3R追撃+1"},
      {name:"貫通の矢",desc:"全矢が防御貫通化"} ],
  9:[
    {
      name:"仕立て直し",
      desc:"人形の衣装を1つを選び、★を+1する（最大★4）"
    },
    {
      name:"生命縫合",
      desc:"自身のHPを消費し、人形の耐久力を回復する（HP0不可）"
    },
    {
      name:"人形暴走",
      desc:"人形を暴走状態にし、破壊されるまでパーツ効果が2倍になる"
    },
  ],

};



/* ==================== ログ追加 ==================== */
function appendLog(boxId, className, text){
  const box=document.getElementById(boxId);
  const div=document.createElement("div");
  div.className="log-line "+className;
  div.textContent=text;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

// ============================================
// ★ WebSocket 受信処理 共通化（CPU戦 / 対人 共通）
// ============================================
function attachWsHandlers() {

  ws.onerror = (e) => {
    appendLog("systemBox", "system-log", "❌ サーバー接続に失敗しました");
    console.error("WebSocket error:", e);
  };

  ws.onmessage = (msg) => {
    console.log("[WS RECEIVE RAW]", msg.data);

    const data = JSON.parse(msg.data);

    // ★ マッチ成立 → フェーズ2へ
    if (data.type === "match_start") {
      setPhase(PHASE.BATTLE);
      return;
    }

    // ===============================
    // ↓↓↓ ここから下は「元の ws.onmessage の中身」を
    //     そのまま全部コピペして置き換える ↓↓↓
    // ===============================
    // 人形使い：着せ替え部位選択（簡易UI）
    if (data.type === "request_doll_part_select") {

      const parts = [
        { key: "head", label: "帽子" },
        { key: "body", label: "服" },
        { key: "leg",  label: "ズボン" },
        { key: "foot", label: "靴" }
      ];

      const popup = document.getElementById("skillPopup");
      const list  = document.getElementById("skillList");

      let html = `<div style="font-weight:bold; margin-bottom:8px;">
        強化する部位を選んでください
      </div>`;

      for (const p of parts) {
        html += `
          <button onclick="selectDollPart('${p.key}')" style="margin:4px;">
            ${p.label}
          </button><br>
        `;
      }

      list.innerHTML = html;
      popup.style.display = "flex";
      return;
    }


    if (data.type === "status_simple") {

      const box =
        data.side === "self"
          ? document.getElementById("my-status-simple")
          : document.getElementById("enemy-status-simple");

      let html = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="display:flex; align-items:center; gap:8px;">
            <strong>${data.side === "self" ? "あなた" : "相手"}</strong>
            <span style="opacity:0.9;">${data.job ?? "?"}</span>
          </div>
          <button onclick="openStatusDetail('${data.side}')">詳細</button>
        </div>

        <div style="display:flex; gap:8px; margin-top:6px;">
          
          <!-- 左：プレイヤー -->
          <div style="flex:1;">
            <div>HP: ${data.hp} / ${data.max_hp}</div>
            <div>攻撃: ${data.attack}</div>
            <div>防御: ${data.defense}</div>
            <div>コイン: ${data.coins}</div>
            <div>Lv: ${data.level}</div>
            ${
              data.mana !== null
                ? `<div>魔力: ${data.mana} / ${data.mana_max}</div>`
                : ""
            }
          </div>

          <!-- 右：人形 -->
          <div style="flex:1; border-left:1px solid #555; padding-left:6px;">
            ${
              data.doll
                ? `
                  <div style="color:#f6c;">🪆 人形</div>
                  <div>耐久: ${data.doll.durability} / ${data.doll.max_durability}
                    ${data.doll.is_broken ? "（破壊）" : ""}
                  </div>
                  <div>攻撃: ${data.doll.attack}</div>
                  <div>防御: ${data.doll.defense}</div>
                `
                : `<div style="color:#777;">人形なし</div>`
            }
          </div>

        </div>
      `;


      box.innerHTML = html;
      return;
    }


    if (data.type === "status_detail") {
      console.log("status_detail data:", data);

      document.getElementById("statusDetailTitle").textContent =
        data.side === "self" ? "あなたの詳細ステータス" : "相手の詳細ステータス";

      let html = `
        <div><b>HP</b>: ${data.hp} / ${data.max_hp}</div>
        <div><b>攻撃力</b>: ${data.attack}</div>
        <div><b>防御力</b>: ${data.defense}</div>
        <div><b>コイン</b>: ${data.coins}</div>
        <div><b>Lv</b>: ${data.level}</div>
        <div><b>EXP</b>: ${data.exp}</div>
      `;

      if (data.mana !== null) {
        html += `<div><b>魔力</b>: ${data.mana} / ${data.mana_max}</div>`;
      }

      if (data.equipment?.length) {
        html += `<hr><b>装備中</b><br>${data.equipment.join("<br>")}`;
      }

      if (data.buffs?.length) {
        html += `<hr><b>バフ</b><br>${data.buffs.join("<br>")}`;
      }

      if (data.shikigami?.length) {
        html += `<hr><b>式神</b><br>${data.shikigami.join("<br>")}`;
      }
      // ================================
      // ★ 人形使い：装備中の衣装表示
      // ================================
      if (data.doll && data.doll.costumes) {

        html += `<hr><b>🪆 人形</b><br>`;
        html += `耐久：${data.doll.durability} / ${data.doll.max_durability}`;
        if (data.doll.is_broken) {
          html += `（破壊）`;
        }
        html += `<br>`;
        html += `攻撃：${data.doll.attack}<br>`;
        html += `防御：${data.doll.defense}<br><br>`;

        html += `<b>人形の衣装</b><br>`;

        const parts = {
          head: "頭",
          body: "胴",
          leg: "脚",
          foot: "足"
        };

        for (const [part, label] of Object.entries(parts)) {
          const c = data.doll.costumes[part];
          if (c) {
            const cleanName = c.name
              ? c.name.replace(/^★\d+/, "")
              : "衣装";

            html += `${label}：★${c.star ?? 1} ${cleanName}<br>`;

          } else {
            html += `${label}：なし<br>`;
          }
        }
      }


      document.getElementById("statusDetailBody").innerHTML = html;
      document.getElementById("statusDetailPopup").style.display = "flex";
      return;
    }

    /* --- HP --- */
    if (data.type === "hp") {
      const hpEl = document.getElementById("hp");
      if (hpEl) {
        hpEl.textContent =
          `あなたのHP ${data.myHP} / 敵HP ${data.enemyHP}`;
      }
      return;
}


    
    if (data.type === "job_info") {
        window.myJob = data.job;
        console.log("My Job = ", window.myJob);
        return;
    }

    if (data.type === "mana_info") {
      const nowEl = document.getElementById("mana_now");
      const maxEl = document.getElementById("mana_max");
      const blockEl = document.getElementById("mana_block");

      if (nowEl && maxEl) {
        nowEl.textContent = data.mana;
        maxEl.textContent = data.mana_max;
      }

      if (blockEl) {
        blockEl.style.display = "block";
      }
      return;
    }

    /* --- EXP --- */
    if (data.type === "exp_info") {
      const expEl = document.getElementById("exp");
      if (expEl) {
        expEl.textContent = data.exp;
      }
      return;
    }


    /* --- レベル情報 --- */
    if (data.type === "level_info") {
      myLevel = data.level;

      const levelEl = document.getElementById("level");
      if (levelEl) {
        levelEl.textContent = "Lv " + data.level;
      }

      const lvupBtn = document.getElementById("lvupBtn");
      if (lvupBtn) {
        lvupBtn.disabled = !myTurn;
      }

      return;
    }



    if (data.type === "item_list") {
      window.itemList = data.items;

      // ★「開いているときだけ」再描画
      if (isItemUIOpen && currentItemCategory !== null) {
        openItemCategory(currentItemCategory);
      }
      return;
    }


    
    if (data.type === "status_info") {

      window.arrowSlots = data.arrow_slots ?? 1;
      const isOnmyoji = (window.myJob === "陰陽師");

      // ---------------------------
      // 式神表示（陰陽師）
      // ---------------------------
      let shikiHTML = "";
      if (isOnmyoji) {
        shikiHTML = `
          <div id="shikigami-list" style="margin-top:8px; font-size:12px; color:#6cf;">
            ${
              !data.shikigami || data.shikigami.length === 0
                ? "（式神なし）"
                : data.shikigami.map(s => `${s}`).join("<br>")
            }
          </div>
        `;
      }

      // ---------------------------
      // 人形表示（人形使い）
      // ---------------------------
      let dollHTML = "";
      if (data.doll) {
        const state = data.doll.is_broken ? "（破壊）" : "";
        dollHTML = `
          <hr>
          <div style="margin-top:6px; color:#f6c;">
            🪆 人形耐久：${data.doll.durability} / ${data.doll.max_durability} ${state}
          </div>
        `;
      }

      const panel = document.getElementById("status-panel");
      if (!panel) return;

      panel.innerHTML = `
        攻撃力：${data.attack}<br>
        防御力：${data.defense}<br>

        <div id="buff-list" style="margin-top:8px; font-size:12px; color:#ccc;">
          ${
            data.buffs.length === 0
              ? "（バフなし）"
              : data.buffs.map(b => `${b}`).join("<br>")
          }
        </div>

        ${shikiHTML}
        ${dollHTML}
      `;

      return;
    }





    // ★追加：ショップ商品リスト受信
    if (data.type === "shop_list") {
        renderShop(data.items);
        return;
    }


    /* --- コイン --- */
    if (data.type === "coin_info") {
      const coinEl = document.getElementById("coins");
      if (coinEl) {
        coinEl.textContent = data.coins;
      }
      return;
    }

    /* --- 自分のラウンド --- */
    if(data.type==="your_turn"){
      myTurn = true;
      appendLog("systemBox","system-log", data.msg);

      document.getElementById("atkBtn").disabled = false;
      document.getElementById("skillBtn").disabled = false;
      document.getElementById("lvupBtn").disabled = false; // 常に押せる
      document.getElementById("itemBtn").disabled = false;
      document.getElementById("shopBtn").disabled = false;

      return;
    }

    /* --- 相手ラウンド --- */
    if(data.type==="wait_turn"){
      myTurn = false;
      appendLog("systemBox","system-log", data.msg);

// ★ 相手ラウンドになったらショップを強制的に閉じる
      closeShopUI();

      document.getElementById("atkBtn").disabled = true;
      document.getElementById("skillBtn").disabled = true;
      document.getElementById("lvupBtn").disabled = true;
      document.getElementById("itemBtn").disabled = true;
      document.getElementById("shopBtn").disabled = true;


      return;
    }

    /* --- 戦闘ログ --- */
    if (data.type === "battle_log") {
      appendLog("battleBox", "battle-log", data.msg);

      // ★ 勝敗確定ログを検知（server.js の実文言に完全一致）
      if (
        data.msg.includes("の勝利！！") ||
        data.msg.includes("引き分け！")
      ) {
        battleEnded = true;
        document.getElementById("btnBackToMenu").style.display = "inline-block";
      }

      return;
    }

    if(data.type==="skill_log"){
      appendLog("battleBox","skill-log",data.msg);
      return;
    }

    /* --- システム --- */
    if(data.type==="system_log"){
      appendLog("systemBox","system-log",data.msg);
      return;
    }

    /* --- エラー --- */
    if(data.type==="error_log"){
      appendLog("systemBox","error-log",data.msg);
      return;
    }

    /* --- デバッグ --- */
    if(data.type==="debug_log"){
      appendLog("debugBox","debug-log",data.msg);
      return;
    }

    /* --- level_up_request の返信 --- */
    if(data.type==="level_up_check"){
      if(data.canExp){
        ws.send(JSON.stringify({type:"level_up_exp"}));
        return;
      }
      if(data.canCoins){
        if(confirm(`EXP不足！\nコイン${data.needCoins}で補填しますか？`)){
          ws.send(JSON.stringify({type:"level_up_coins"}));
        }
        return;
      }
      alert("❌ EXPもコインも足りません！");
    }

    // ---------- アイテム使用結果 ----------
    if (data.type === "use_item_result") {
        if (data.success) {
            // 正常使用 → アイテムUIを閉じて行動に戻る
            closeItemUI();
        } else {
            // 失敗 → カテゴリ選択に戻す
            document.getElementById("itemCategoryPopup").style.display = "flex";
            if (data.message) {
                alert(data.message);
            }
        }
        return;
    }

  };
}

/* ================= スキル系 ================= */
function openSkillUI(){
  const list = document.getElementById("skillList");
  list.innerHTML = "";

  const jobId =
    typeof myJob === "number"
      ? myJob
      : JOB_ID_MAP[myJob];

  if (!SKILLS[jobId]) {
    console.error("スキル定義が見つかりません:", myJob, jobId);
    return;
  }


  SKILLS[jobId].forEach((s, i) => {
    const needLv = i + 1;

    const row = document.createElement("div");
    row.className = "skillRow";

    const isDoll = (myJob === "人形使い" || myJob === 9);
    const isDollSkill1 = isDoll && i === 0;
    const isDollSkill2 = isDoll && i === 1;
    const isDollSkill3 = isDoll && i === 2;

    // ← ここが差し替え部分
    const nameDiv = document.createElement("div");
    nameDiv.className = "skillName";
    nameDiv.textContent = `【${i+1}】${s.name}`;

    const descDiv = document.createElement("div");
    descDiv.className = "skillDesc";
    descDiv.textContent = s.desc;

    const btn = document.createElement("button");
    btn.textContent = "使用";
    if (myLevel < needLv) btn.disabled = true;

    if (isDollSkill1) {
      btn.addEventListener("click", useDollSkill1);
    } else if (isDollSkill2) {
      btn.addEventListener("click", useDollSkill2Prompt);
    } else if (isDollSkill3) {
      btn.addEventListener("click", useDollSkill3);
    } else {
      btn.addEventListener("click", () => useSkill(i + 1));
    }

    row.appendChild(nameDiv);
    row.appendChild(descDiv);
    row.appendChild(btn);

    list.appendChild(row);
  });

  document.getElementById("skillPopup").style.display = "flex";
}




function closeSkillUI(){
  document.getElementById("skillPopup").style.display="none";
}

function useSkill(num){
  if(!myTurn) return;

  // ★ 弓兵スキル2：arrowSlots を先に反映（表示用）
  if (window.myJob === "弓兵" && num === 2) {
    window.arrowSlots = 2;
  }

  ws.send(JSON.stringify({type:"action", action:"スキル"+num}));
  closeSkillUI();
}

function openItemCategory(category){
  currentItemCategory = category;

  const list = all.filter(it => it.category === category);

    equip: "装備一覧",
    special: "特殊装備一覧"
  };
  document.getElementById("itemPopupTitle").innerText = titleMap[category];

  const box = document.getElementById("itemList");
  box.innerHTML = "";

  list.forEach(it=>{
    const row = document.createElement("div");
    row.className = "skillRow";

    let btn = "";

    // ★ 使用できるアイテム（回復・修理キットなど）
    if (
      category === "item" ||
      (category === "special" && it.name === "修理キット")
    ) {
      btn = `<button onclick="useItem('${it.uid}','use')">使用</button>`;
    }
    // ★ 装備系
    else {
      btn = `<button onclick="onEquipButtonByUid('${it.uid}')">装備</button>`;
    }


    row.innerHTML = `
      <div class="skillName">${it.name}</div>
      <div style="font-size:12px; color:#ccc; white-space:pre-line;">
        ${it.effect_text ?? ""}
      </div>
      <div style="margin-top:5px;">${btn}</div>
    `;

    box.appendChild(row);
  });

  document.getElementById("itemPopup").style.display = "flex";
}

function openArrowSlotSelect(item) {
  pendingArrowItem = item;

  // slot2 が使えるかは「最後に受信した値」で判断
  if (window.arrowSlots >= 2) {
    const slot = confirm(
      "どちらのスロットに装備しますか？\nOK: スロット2 / キャンセル: スロット1"
    )
      ? 2
      : 1;

    useItem(item.uid, "arrow", slot);
  } else {
    useItem(item.uid, "arrow", 1);
  }

  pendingArrowItem = null;
}
function onEquipButton(item) {
 

  // ===== 矢判定（名前 or 装備種別で判断）=====
  const isArrow =
    item.equip_type?.includes("arrow") ||
    item.name?.includes("矢");

  if (isArrow) {

    // slot2 が使えるなら選ばせる
    if (window.arrowSlots >= 2) {
      const slot = confirm(
        "スロット2に装備しますか？\nOK: スロット2 / キャンセル: スロット1"
      )
        ? 2
        : 1;

      useItem(item.uid, "arrow", slot);
    } else {
      useItem(item.uid, "arrow", 1);
    }
    return; // ★ ここで必ず終了
  }

  // ★ 人形衣装は special 扱い
  if (item.is_doll_costume) {
    useItem(item.uid, "special");
    return;
  }

  // 以下は今まで通り
  if (
    item.equip_type === "mage_equip" ||
    item.equip_type === "alchemist_unique"
  ) {
    useItem(item.uid, "special");
  } else {
    useItem(item.uid, "equip");
  }
}



function onEquipButtonByUid(uid) {
  console.log("[DEBUG] onEquipButtonByUid uid =", uid);
  console.log("[DEBUG] itemList =", window.itemList);

  const item = (window.itemList || []).find(it => it.uid === uid);
  if (!item) {
    console.error("item not found:", uid);
